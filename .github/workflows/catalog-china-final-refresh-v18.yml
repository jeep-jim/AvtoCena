name: Catalog China final refresh v18

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/catalog-china-final-refresh-v18.yml

permissions:
  contents: write

concurrency:
  group: catalog-production-import
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 100
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Reset Guazi scan
        run: npx tsx scripts/catalog-reset-underfilled-scans.mjs
        env:
          JSON_STORAGE_DRIVER: object
          YC_OBJECT_STORAGE_ENDPOINT: ${{ secrets.YC_OBJECT_STORAGE_ENDPOINT }}
          YC_OBJECT_STORAGE_REGION: ${{ secrets.YC_OBJECT_STORAGE_REGION }}
          YC_OBJECT_STORAGE_BUCKET: ${{ secrets.YC_OBJECT_STORAGE_BUCKET }}
          YC_OBJECT_STORAGE_ACCESS_KEY_ID: ${{ secrets.YC_OBJECT_STORAGE_ACCESS_KEY_ID }}
          YC_OBJECT_STORAGE_SECRET_ACCESS_KEY: ${{ secrets.YC_OBJECT_STORAGE_SECRET_ACCESS_KEY }}
          YC_OBJECT_STORAGE_PREFIX: ${{ secrets.YC_OBJECT_STORAGE_PREFIX }}
          CATALOG_IMPORT_SOURCES: guazi_china_export
      - name: Refresh China
        run: |
          cat > scripts/catalog-china-final-refresh-v18.mjs <<'NODE'
          const fs = await import('node:fs/promises');
          const { catalogImportSources, importCatalog } = await import('../apps/web/lib/catalog/importer.ts');
          const { exactMarketSources } = await import('../apps/web/lib/catalog/exact-market-sources.ts');
          const { mutateSourcePolicy } = await import('../apps/web/lib/catalog/policy.ts');
          const { credibleCatalogImages, isCrediblePublicOffer } = await import('../apps/web/lib/catalog/offer-quality.ts');
          const { readAllOffersForMaintenance } = await import('../apps/web/lib/catalog/storage.ts');
          for (const source of exactMarketSources) {
            const index = catalogImportSources.findIndex((item) => item.sourceId === source.sourceId);
            if (index >= 0) catalogImportSources[index] = source;
            else catalogImportSources.push(source);
          }
          const source = catalogImportSources.find((item) => item.sourceId === 'guazi_china_export');
          if (!source) throw new Error('missing_guazi_china_export');
          const count = (offers) => offers.filter((offer) => offer.market === 'china' && isCrediblePublicOffer(offer)).length;
          const beforeOffers = await readAllOffersForMaintenance();
          const before = count(beforeOffers);
          await mutateSourcePolicy(source, (policy) => ({ ...policy, enabled:true, blockedUntil:undefined, consecutiveFailures:0, maxPagesPerRun:Math.max(Number(policy.maxPagesPerRun||0),45), maxOffersPerRun:Math.max(Number(policy.maxOffersPerRun||0),600), maxDetailsPerRun:Math.max(Number(policy.maxDetailsPerRun||0),600), imagesEnabled:true }));
          process.env.CATALOG_TARGET_PER_MARKET = '250';
          process.env.CATALOG_IMPORT_BUDGET_MS = String(80 * 60000);
          process.env.CATALOG_SOURCE_BUDGET_MS = String(75 * 60000);
          process.env.CATALOG_MAX_IMAGES_PER_OFFER = '3';
          const result = await importCatalog({ sourceIds:['guazi_china_export'], maxOffers:600, maxDetails:600, maxImagesPerOffer:3, maxPages:45, requireObjectStorage:true, failOnZeroSaved:false, reportPath:'catalog/imports/latest-china-final-v18.json' });
          const afterOffers = await readAllOffersForMaintenance();
          const after = count(afterOffers);
          const firstImageOwners = new Map();
          for (const offer of afterOffers.filter((item)=>item.market==='china'&&isCrediblePublicOffer(item))) {
            const first = credibleCatalogImages(offer.images||[])[0];
            const key = String(first?.checksum||first?.id||'');
            if (!key) continue;
            const rows = firstImageOwners.get(key)||[];
            rows.push({id:offer.id,make:offer.make,model:offer.model,year:offer.year});
            firstImageOwners.set(key,rows);
          }
          const duplicateFirstImages = [...firstImageOwners.entries()].filter(([,rows])=>rows.length>1).map(([checksum,rows])=>({checksum,rows}));
          const report = {version:18,market:'china',before,after,reached:after>=250,imported:result.imported,updated:result.updated,rejectedByQuality:result.rejectedByQuality,imageFailures:result.imageFailures,duplicateFirstImages,sources:result.sources,finishedAt:new Date().toISOString()};
          await fs.writeFile('catalog-china-final-refresh-v18.json',JSON.stringify(report,null,2));
          console.log(JSON.stringify(report,null,2));
          NODE
          npx tsx scripts/catalog-china-final-refresh-v18.mjs 2>&1 | tee catalog-china-final-refresh-v18.log
        env:
          JSON_STORAGE_DRIVER: object
          YC_OBJECT_STORAGE_ENDPOINT: ${{ secrets.YC_OBJECT_STORAGE_ENDPOINT }}
          YC_OBJECT_STORAGE_REGION: ${{ secrets.YC_OBJECT_STORAGE_REGION }}
          YC_OBJECT_STORAGE_BUCKET: ${{ secrets.YC_OBJECT_STORAGE_BUCKET }}
          YC_OBJECT_STORAGE_ACCESS_KEY_ID: ${{ secrets.YC_OBJECT_STORAGE_ACCESS_KEY_ID }}
          YC_OBJECT_STORAGE_SECRET_ACCESS_KEY: ${{ secrets.YC_OBJECT_STORAGE_SECRET_ACCESS_KEY }}
          YC_OBJECT_STORAGE_PREFIX: ${{ secrets.YC_OBJECT_STORAGE_PREFIX }}
          CATALOG_SOURCE_TIMEOUT_MS: "35000"
          CATALOG_IMAGE_TIMEOUT_MS: "12000"
      - name: Record result
        if: always()
        run: |
          if [ ! -f catalog-china-final-refresh-v18.json ]; then echo '{"version":18,"market":"china","fatal":true,"error":"report_missing"}' > catalog-china-final-refresh-v18.json; fi
          rm -f scripts/catalog-china-final-refresh-v18.mjs
          git pull --rebase origin main || true
          mkdir -p data/catalog/imports
          cp catalog-china-final-refresh-v18.json data/catalog/imports/last-catalog-china-final-refresh-v18.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/catalog/imports/last-catalog-china-final-refresh-v18.json
          git commit -m "Record China final refresh v18 [skip ci]" || true
          git push origin HEAD:main || true
