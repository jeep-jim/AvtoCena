name: Verify web build

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build web and print concise failure
        shell: bash
        run: |
          set +e
          npm run build > /tmp/avtocena-build.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            echo "--- LAST 180 BUILD LINES ---"
            tail -n 180 /tmp/avtocena-build.log
            exit "$status"
          fi
          tail -n 40 /tmp/avtocena-build.log
