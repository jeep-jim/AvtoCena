name: Verify web build

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build web
        id: build
        shell: bash
        run: |
          set +e
          npm run build > /tmp/avtocena-build.log 2>&1
          status=$?
          tail -n 220 /tmp/avtocena-build.log > /tmp/avtocena-build-tail.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-build-diagnostics
          path: /tmp/avtocena-build-tail.log
          retention-days: 1
      - name: Fail when build failed
        if: steps.build.outputs.status != '0'
        run: |
          echo "Web build failed; diagnostics uploaded."
          exit 1
