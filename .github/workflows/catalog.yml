name: Catalog maintenance
on:
  workflow_dispatch:
# Enable only after legal/source review:
# schedule:
#   - cron: '17 3 * * 2'
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: npm ci
      - run: npm run catalog:validate
