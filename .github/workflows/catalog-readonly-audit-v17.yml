name: Catalog readonly audit v17

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/catalog-readonly-audit-v17.yml

permissions:
  contents: write

concurrency:
  group: catalog-readonly-audit-v17
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Read current production catalog
        run: |
          cat > scripts/catalog-readonly-audit-v17.mjs <<'NODE'
          const fs = await import('node:fs/promises');
          const { credibleCatalogImages, isCrediblePublicOffer } = await import('../apps/web/lib/catalog/offer-quality.ts');
          const { readAllOffersForMaintenance } = await import('../apps/web/lib/catalog/storage.ts');
          const markets = ['japan', 'korea', 'china', 'uae', 'europe'];
          const offers = await readAllOffersForMaintenance();

          function reasons(offer) {
            const result = [];
            if (offer.status !== 'active') result.push(`status:${offer.status}`);
            const year = Number(offer.year || 0);
            const total = Number(offer.totalRub || 0);
            if (!String(offer.make || '').trim()) result.push('make');
            if (!String(offer.model || '').trim()) result.push('model');
            if (year < 1985 || year > new Date().getFullYear() + 1) result.push('year');
            if (!credibleCatalogImages(offer.images || []).length) result.push('images');
            if (!total && !['needs_data', 'auction_start'].includes(String(offer.calculationStatus || ''))) result.push('missing_total');
            if (total && (total < 120000 || total > 180000000)) result.push('total_range');
            if (total && year >= 2022 && total < 900000) result.push('new_too_low');
            else if (total && year >= 2018 && total < 500000) result.push('recent_too_low');
            return result.length ? result : ['other_quality_rule'];
          }

          const report = { version: 17, checkedAt: new Date().toISOString(), totalStored: offers.length, markets: {} };
          for (const market of markets) {
            const marketOffers = offers.filter((offer) => offer.market === market);
            const publicOffers = marketOffers.filter(isCrediblePublicOffer);
            const rejected = marketOffers.filter((offer) => !isCrediblePublicOffer(offer));
            const reasonCounts = {};
            for (const offer of rejected) for (const reason of reasons(offer)) reasonCounts[reason] = (reasonCounts[reason] || 0) + 1;
            const bySource = marketOffers.reduce((out, offer) => { const key = `${offer.sourceId}:${offer.status}`; out[key] = (out[key] || 0) + 1; return out; }, {});
            report.markets[market] = {
              stored: marketOffers.length,
              public: publicOffers.length,
              rejected: rejected.length,
              bySource,
              rejectionReasons: reasonCounts,
              rejectedSamples: rejected.slice(0, 30).map((offer) => {
                const raw = offer.operational?.raw || {};
                const listRaw = raw.offer || raw.list || raw;
                return {
                  id: offer.id,
                  sourceId: offer.sourceId,
                  sourceOfferId: offer.sourceOfferId,
                  make: offer.make,
                  model: offer.model,
                  year: offer.year,
                  sourcePrice: offer.sourcePrice,
                  sourceCurrency: offer.sourceCurrency,
                  totalRub: offer.totalRub,
                  calculationStatus: offer.calculationStatus,
                  status: offer.status,
                  imageCount: credibleCatalogImages(offer.images || []).length,
                  rawPrice: listRaw?.Price ?? listRaw?.price,
                  rawYear: listRaw?.FormYear ?? listRaw?.Year ?? listRaw?.year,
                  rawMake: listRaw?.Manufacturer ?? listRaw?.make,
                  rawModel: listRaw?.Model ?? listRaw?.model,
                  reasons: reasons(offer),
                };
              }),
            };
          }

          const publicOffers = offers.filter(isCrediblePublicOffer);
          const firstImages = new Map();
          for (const offer of publicOffers) {
            const first = credibleCatalogImages(offer.images || [])[0];
            const key = String(first?.checksum || first?.id || '');
            if (!key) continue;
            const rows = firstImages.get(key) || [];
            rows.push({ id: offer.id, market: offer.market, sourceId: offer.sourceId, make: offer.make, model: offer.model, year: offer.year });
            firstImages.set(key, rows);
          }
          report.duplicateFirstImages = [...firstImages.entries()].filter(([, rows]) => rows.length > 1).map(([checksum, rows]) => ({ checksum, rows })).slice(0, 200);

          const prices = new Map();
          for (const offer of publicOffers) {
            const total = Number(offer.totalRub || 0);
            if (!total) continue;
            const key = `${offer.market}:${offer.sourceId}:${total}`;
            const rows = prices.get(key) || [];
            rows.push({ id: offer.id, make: offer.make, model: offer.model, year: offer.year });
            prices.set(key, rows);
          }
          report.repeatedPrices = [...prices.entries()].filter(([, rows]) => rows.length >= 4).map(([key, rows]) => ({ key, count: rows.length, rows: rows.slice(0, 20) })).slice(0, 200);
          await fs.writeFile('catalog-readonly-audit-v17.json', JSON.stringify(report, null, 2));
          console.log(JSON.stringify(Object.fromEntries(markets.map((market) => [market, report.markets[market].public])), null, 2));
          NODE
          npx tsx scripts/catalog-readonly-audit-v17.mjs
        env:
          JSON_STORAGE_DRIVER: object
          YC_OBJECT_STORAGE_ENDPOINT: ${{ secrets.YC_OBJECT_STORAGE_ENDPOINT }}
          YC_OBJECT_STORAGE_REGION: ${{ secrets.YC_OBJECT_STORAGE_REGION }}
          YC_OBJECT_STORAGE_BUCKET: ${{ secrets.YC_OBJECT_STORAGE_BUCKET }}
          YC_OBJECT_STORAGE_ACCESS_KEY_ID: ${{ secrets.YC_OBJECT_STORAGE_ACCESS_KEY_ID }}
          YC_OBJECT_STORAGE_SECRET_ACCESS_KEY: ${{ secrets.YC_OBJECT_STORAGE_SECRET_ACCESS_KEY }}
          YC_OBJECT_STORAGE_PREFIX: ${{ secrets.YC_OBJECT_STORAGE_PREFIX }}
      - name: Record audit
        if: always()
        run: |
          if [ ! -f catalog-readonly-audit-v17.json ]; then printf '{"version":17,"fatal":true,"checkedAt":"%s"}\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > catalog-readonly-audit-v17.json; fi
          rm -f scripts/catalog-readonly-audit-v17.mjs
          git pull --rebase origin main || true
          mkdir -p data/catalog/imports
          cp catalog-readonly-audit-v17.json data/catalog/imports/last-catalog-readonly-audit-v17.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/catalog/imports/last-catalog-readonly-audit-v17.json
          git commit -m "Record readonly five-market audit v17 [skip ci]" || true
          git push origin HEAD:main || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: catalog-readonly-audit-v17
          path: catalog-readonly-audit-v17.json
          retention-days: 7
