name: Catalog production import

on:
  workflow_dispatch:
    inputs:
      reset:
        description: "Очистить текущий каталог перед импортом"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "17 20 * * *"

concurrency:
  group: catalog-production-import
  cancel-in-progress: false

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 220
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Remove test-generated local catalog data
        run: |
          rm -rf data/catalog/internal data/catalog/generations data/catalog/scans data/catalog/health data/catalog/imports data/catalog/sources
          rm -f data/catalog/manifest.json data/catalog/import-lock.json
      - name: Recover historical catalog generations
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.reset) }}
        run: npx tsx scripts/catalog-recover-generations.mjs
        env:
          JSON_STORAGE_DRIVER: object
          YC_OBJECT_STORAGE_ENDPOINT: ${{ secrets.YC_OBJECT_STORAGE_ENDPOINT }}
          YC_OBJECT_STORAGE_REGION: ${{ secrets.YC_OBJECT_STORAGE_REGION }}
          YC_OBJECT_STORAGE_BUCKET: ${{ secrets.YC_OBJECT_STORAGE_BUCKET }}
          YC_OBJECT_STORAGE_ACCESS_KEY_ID: ${{ secrets.YC_OBJECT_STORAGE_ACCESS_KEY_ID }}
          YC_OBJECT_STORAGE_SECRET_ACCESS_KEY: ${{ secrets.YC_OBJECT_STORAGE_SECRET_ACCESS_KEY }}
          YC_OBJECT_STORAGE_PREFIX: ${{ secrets.YC_OBJECT_STORAGE_PREFIX }}
          CATALOG_RECOVERY_GENERATIONS: "gen_1784276049832_9868cbbe"
          CATALOG_RECOVERY_MAX_CHUNKS: "20"
          CATALOG_RECOVERY_MIN_GAIN: "5"
      - name: Recover previously valid catalog before scanning sources
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.reset) }}
        run: npx tsx scripts/catalog-recover-active.mjs
        env:
          JSON_STORAGE_DRIVER: object
          YC_OBJECT_STORAGE_ENDPOINT: ${{ secrets.YC_OBJECT_STORAGE_ENDPOINT }}
          YC_OBJECT_STORAGE_REGION: ${{ secrets.YC_OBJECT_STORAGE_REGION }}
          YC_OBJECT_STORAGE_BUCKET: ${{ secrets.YC_OBJECT_STORAGE_BUCKET }}
          YC_OBJECT_STORAGE_ACCESS_KEY_ID: ${{ secrets.YC_OBJECT_STORAGE_ACCESS_KEY_ID }}
          YC_OBJECT_STORAGE_SECRET_ACCESS_KEY: ${{ secrets.YC_OBJECT_STORAGE_SECRET_ACCESS_KEY }}
          YC_OBJECT_STORAGE_PREFIX: ${{ secrets.YC_OBJECT_STORAGE_PREFIX }}
          CATALOG_RECOVERY_WINDOW_MS: "3888000000"
          CATALOG_RECOVERY_MIN_PUBLIC: "2"
      - name: Import up to 250 offers and 10 photos from every public market
        run: npm run catalog:import:sample
        env:
          JSON_STORAGE_DRIVER: object
          YC_OBJECT_STORAGE_ENDPOINT: ${{ secrets.YC_OBJECT_STORAGE_ENDPOINT }}
          YC_OBJECT_STORAGE_REGION: ${{ secrets.YC_OBJECT_STORAGE_REGION }}
          YC_OBJECT_STORAGE_BUCKET: ${{ secrets.YC_OBJECT_STORAGE_BUCKET }}
          YC_OBJECT_STORAGE_ACCESS_KEY_ID: ${{ secrets.YC_OBJECT_STORAGE_ACCESS_KEY_ID }}
          YC_OBJECT_STORAGE_SECRET_ACCESS_KEY: ${{ secrets.YC_OBJECT_STORAGE_SECRET_ACCESS_KEY }}
          YC_OBJECT_STORAGE_PREFIX: ${{ secrets.YC_OBJECT_STORAGE_PREFIX }}
          CATALOG_IMPORT_RESET: ${{ github.event_name == 'workflow_dispatch' && inputs.reset && 'true' || 'false' }}
          CATALOG_TARGET_PUBLIC_OFFERS: "1250"
          CATALOG_TARGET_PER_MARKET: "250"
          CATALOG_ENCAR_DIRECT_PAGE_SIZE: "64"
          CATALOG_ENCAR_DIRECT_LIST_RPM: "30"
          CATALOG_ENCAR_DIRECT_DETAIL_RPM: "240"
          CATALOG_ENCAR_DIRECT_IMAGE_RPM: "600"
          CATALOG_CHE168_GLOBAL_PAGE_SIZE: "64"
          CATALOG_CHE168_GLOBAL_MAX_BRANDS: "48"
          CATALOG_IMPORT_MAX_OFFERS: "250"
          CATALOG_IMPORT_MAX_DETAILS: "250"
          CATALOG_IMPORT_MAX_PAGES: "30"
          CATALOG_MAX_IMAGES_PER_OFFER: "10"
          CATALOG_SOURCE_TIMEOUT_MS: "35000"
          CATALOG_IMAGE_TIMEOUT_MS: "20000"
          CATALOG_IMPORT_BUDGET_MS: "10800000"
          CATALOG_SOURCE_BUDGET_MS: "1800000"
          CATALOG_OFFER_RETENTION_MS: "3888000000"
          CATALOG_STALE_GRACE_MS: "3888000000"
          CATALOG_RESTART_UNDERFILLED_SCANS: "true"
          CATALOG_PRESERVE_PREVIOUS_ON_FAILURE: "true"
          CATALOG_IMPORT_REPORT_FILE: catalog-import-public-markets-report.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: catalog-import-public-markets-report
          path: catalog-import-public-markets-report.json
          if-no-files-found: warn
          retention-days: 7
      - name: Summary
        if: always()
        run: |
          node - <<'NODE' >> "$GITHUB_STEP_SUMMARY"
          const fs = require('fs');
          const path = 'catalog-import-public-markets-report.json';
          if (!fs.existsSync(path)) {
            console.log('Отчёт импорта не создан. Смотрите журнал шага импорта.');
            process.exit(0);
          }
          const json = JSON.parse(fs.readFileSync(path, 'utf8'));
          for (const key of ['imported','updated','expired','skipped','rejectedByQuality','preservedPrevious','imageFailures','underfilledImages','reusedImageSets','publicOffers','targetPublicOffers','targetPerMarket','targetReached','targetReachedByMarket','generationId','durationMs']) {
            console.log(`- ${key}: ${json[key] ?? ''}`);
          }
          console.log('\n### Автомобили по рынкам');
          for (const market of ['korea','china','japan','uae','europe']) {
            const count = json.publicByMarket?.[market] || 0;
            const missing = json.missingByMarket?.[market] || 0;
            const refreshed = json.refreshedByMarket?.[market] || 0;
            console.log(`- ${market}: ${count} в каталоге; обработано сегодня ${refreshed}; до дневной цели осталось ${missing}`);
          }
          console.log('\n### Источники');
          for (const source of json.sources || []) {
            console.log(`- ${source.sourceId} (${source.market || 'multi'}): ${source.ok ? `OK, seen ${source.seen ?? 0}, saved ${source.saved ?? 0}` : `ERROR ${source.error || ''}`}`);
          }
          NODE
