name: Catalog daily verified all markets

on:
  workflow_dispatch:
    inputs:
      reset:
        description: "Очистить текущий каталог перед импортом"
        required: false
        default: false
        type: boolean
  push:
    branches: [main]
    paths:
      - .github/workflows/catalog-production-import.yml
      - apps/web/lib/catalog/importer.ts
      - apps/web/lib/catalog/encar-complete-source.ts
      - apps/web/lib/catalog/otomoto-current-source.ts
      - apps/web/lib/catalog/otomoto-detail-source.ts
      - apps/web/lib/catalog/che168-exact-source.ts
      - apps/web/lib/catalog/che168-dealer-source.ts
      - apps/web/lib/catalog/goonet-exact-source.ts
      - apps/web/lib/catalog/dubicars-current-source.ts
      - scripts/catalog-refresh-galleries.mjs
  schedule:
    - cron: "17 20 * * *"

permissions:
  contents: read

concurrency:
  group: catalog-production-import
  cancel-in-progress: false

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - name: Verify catalog source code
        run: npm run typecheck

      - name: Repair the reported Encar gallery first
        run: npx tsx scripts/catalog-refresh-galleries.mjs
        env: &storage
          JSON_STORAGE_DRIVER: object
          YC_OBJECT_STORAGE_ENDPOINT: ${{ secrets.YC_OBJECT_STORAGE_ENDPOINT }}
          YC_OBJECT_STORAGE_REGION: ${{ secrets.YC_OBJECT_STORAGE_REGION }}
          YC_OBJECT_STORAGE_BUCKET: ${{ secrets.YC_OBJECT_STORAGE_BUCKET }}
          YC_OBJECT_STORAGE_ACCESS_KEY_ID: ${{ secrets.YC_OBJECT_STORAGE_ACCESS_KEY_ID }}
          YC_OBJECT_STORAGE_SECRET_ACCESS_KEY: ${{ secrets.YC_OBJECT_STORAGE_SECRET_ACCESS_KEY }}
          YC_OBJECT_STORAGE_PREFIX: ${{ secrets.YC_OBJECT_STORAGE_PREFIX }}
          CATALOG_IMAGE_CDN_URL: ${{ secrets.CATALOG_IMAGE_CDN_URL }}
          CATALOG_GROW_ONLY_MARKETS: korea
          CATALOG_GALLERY_MARKETS: korea
          CATALOG_GALLERY_SOURCE_IDS: encar_direct
          CATALOG_GALLERY_OFFER_IDS: d4353979acb720365324de54
          CATALOG_GALLERY_FORCE: "true"
          CATALOG_GALLERY_MAX_OFFERS: "1"
          CATALOG_GALLERY_MAX_PER_MARKET: "1"
          CATALOG_GALLERY_MIN_IMAGES: "80"
          CATALOG_MAX_IMAGES_PER_OFFER: "80"
          CATALOG_GALLERY_PERSIST_EVERY: "1"
          CATALOG_SOURCE_TIMEOUT_MS: "45000"
          CATALOG_IMAGE_TIMEOUT_MS: "30000"
          CATALOG_GALLERY_REPORT_FILE: catalog-gallery-priority-report.json

      - name: Remove test-generated local catalog data
        run: |
          rm -rf data/catalog/internal data/catalog/generations data/catalog/scans data/catalog/health data/catalog/imports data/catalog/sources
          rm -f data/catalog/manifest.json data/catalog/import-lock.json

      - name: Recover historical catalog generations
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.reset) }}
        run: npx tsx scripts/catalog-recover-generations.mjs
        env:
          <<: *storage
          CATALOG_RECOVERY_GENERATIONS: "gen_1784276049832_9868cbbe"
          CATALOG_RECOVERY_MAX_CHUNKS: "30"
          CATALOG_RECOVERY_MIN_GAIN: "5"
          CATALOG_GROW_ONLY_MARKETS: korea

      - name: Recover previously valid catalog before scanning sources
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.reset) }}
        run: npx tsx scripts/catalog-recover-active.mjs
        env:
          <<: *storage
          CATALOG_RECOVERY_WINDOW_MS: "3888000000"
          CATALOG_RECOVERY_MIN_PUBLIC: "2"
          CATALOG_GROW_ONLY_MARKETS: korea

      - name: Restart verified source cursors
        run: npx tsx scripts/catalog-reset-underfilled-scans.mjs
        env:
          <<: *storage
          CATALOG_IMPORT_SOURCES: "encar_direct,che168_dealer_exact,che168_china_exact,che168_global,goonet_japan_exact,jpauc_japan,dubicars_uae_exact,otomoto_europe_exact"

      - name: Import 250 verified offers with full galleries from all five markets
        run: npm run catalog:import:sample
        env:
          <<: *storage
          CATALOG_IMPORT_RESET: ${{ github.event_name == 'workflow_dispatch' && inputs.reset && 'true' || 'false' }}
          CATALOG_IMPORT_SOURCES: "encar_direct,che168_dealer_exact,che168_china_exact,che168_global,goonet_japan_exact,jpauc_japan,dubicars_uae_exact,otomoto_europe_exact"
          CATALOG_TARGET_PUBLIC_OFFERS: "1250"
          CATALOG_TARGET_PER_MARKET: "250"
          CATALOG_GROW_ONLY_MARKETS: korea
          CATALOG_PRESERVE_PREVIOUS_ON_FAILURE: "true"
          CATALOG_ENCAR_DIRECT_PAGE_SIZE: "64"
          CATALOG_ENCAR_DIRECT_LIST_RPM: "30"
          CATALOG_ENCAR_DIRECT_DETAIL_RPM: "240"
          CATALOG_ENCAR_DIRECT_IMAGE_RPM: "600"
          CATALOG_CHE168_GLOBAL_PAGE_SIZE: "64"
          CATALOG_CHE168_GLOBAL_MAX_BRANDS: "48"
          CATALOG_IMPORT_MAX_OFFERS: "700"
          CATALOG_IMPORT_MAX_DETAILS: "700"
          CATALOG_IMPORT_MAX_PAGES: "60"
          CATALOG_MAX_IMAGES_PER_OFFER: "80"
          CATALOG_IMAGE_FETCH_CONCURRENCY: "6"
          CATALOG_EXACT_DETAILS_PER_PAGE: "80"
          CATALOG_SOURCE_TIMEOUT_MS: "45000"
          CATALOG_IMAGE_TIMEOUT_MS: "30000"
          CATALOG_RATE_TIMEOUT_MS: "15000"
          CATALOG_IMPORT_BUDGET_MS: "18000000"
          CATALOG_SOURCE_BUDGET_MS: "3000000"
          CATALOG_OFFER_RETENTION_MS: "3888000000"
          CATALOG_STALE_GRACE_MS: "3888000000"
          CATALOG_IMPORT_REPORT_FILE: catalog-import-public-markets-report.json

      - name: Repair the most underfilled galleries across all markets
        run: npx tsx scripts/catalog-refresh-galleries.mjs
        env:
          <<: *storage
          CATALOG_GALLERY_MARKETS: "korea,china,japan,uae,europe"
          CATALOG_GALLERY_MAX_OFFERS: "150"
          CATALOG_GALLERY_MAX_PER_MARKET: "30"
          CATALOG_GALLERY_MIN_IMAGES: "10"
          CATALOG_MAX_IMAGES_PER_OFFER: "80"
          CATALOG_GALLERY_PERSIST_EVERY: "15"
          CATALOG_SOURCE_TIMEOUT_MS: "45000"
          CATALOG_IMAGE_TIMEOUT_MS: "30000"
          CATALOG_GALLERY_REPORT_FILE: catalog-gallery-refresh-report.json
          CATALOG_GROW_ONLY_MARKETS: korea

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: catalog-production-reports
          path: |
            catalog-gallery-priority-report.json
            catalog-import-public-markets-report.json
            catalog-gallery-refresh-report.json
          if-no-files-found: warn
          retention-days: 7

      - name: Summary
        if: always()
        run: |
          node - <<'NODE' >> "$GITHUB_STEP_SUMMARY"
          const fs = require('fs');
          for (const path of ['catalog-gallery-priority-report.json', 'catalog-import-public-markets-report.json', 'catalog-gallery-refresh-report.json']) {
            console.log(`\n## ${path}`);
            if (!fs.existsSync(path)) {
              console.log('Отчёт не создан — проверьте шаг выше.');
              continue;
            }
            const json = JSON.parse(fs.readFileSync(path, 'utf8'));
            if (path.includes('gallery')) {
              console.log(`- selected: ${json.selected ?? 0}`);
              console.log(`- refreshed: ${json.refreshed ?? 0}`);
              console.log(`- expanded: ${json.expanded ?? 0}`);
              console.log(`- unchanged: ${json.unchanged ?? 0}`);
              console.log(`- failed: ${json.failed ?? 0}`);
              for (const row of json.rows || []) console.log(`- ${row.market}/${row.sourceId}/${row.id}: ${row.before} → ${row.after}${row.ok ? '' : ` ERROR ${row.error || ''}`}`);
              continue;
            }
            for (const key of ['imported','updated','expired','skipped','rejectedByQuality','preservedPrevious','imageFailures','underfilledImages','reusedImageSets','publicOffers','targetPublicOffers','targetPerMarket','targetReached','generationId','durationMs']) console.log(`- ${key}: ${json[key] ?? ''}`);
            for (const market of ['korea','china','japan','uae','europe']) console.log(`- ${market}: ${json.publicByMarket?.[market] || 0}; refreshed ${json.refreshedByMarket?.[market] || 0}`);
          }
          NODE
