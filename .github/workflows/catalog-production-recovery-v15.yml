name: Catalog daily incremental update

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - apps/web/lib/catalog/otomoto-detail-source.ts
      - scripts/catalog-daily-incremental.mjs
      - .github/workflows/catalog-production-recovery-v15.yml

permissions:
  contents: read

concurrency:
  group: catalog-daily-incremental
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Validate incremental update script
        run: node --check scripts/catalog-daily-incremental.mjs
      - name: Update catalog without redownloading unchanged galleries
        run: npx tsx scripts/catalog-daily-incremental.mjs
        env:
          JSON_STORAGE_DRIVER: object
          YC_OBJECT_STORAGE_ENDPOINT: ${{ secrets.YC_OBJECT_STORAGE_ENDPOINT }}
          YC_OBJECT_STORAGE_REGION: ${{ secrets.YC_OBJECT_STORAGE_REGION }}
          YC_OBJECT_STORAGE_BUCKET: ${{ secrets.YC_OBJECT_STORAGE_BUCKET }}
          YC_OBJECT_STORAGE_ACCESS_KEY_ID: ${{ secrets.YC_OBJECT_STORAGE_ACCESS_KEY_ID }}
          YC_OBJECT_STORAGE_SECRET_ACCESS_KEY: ${{ secrets.YC_OBJECT_STORAGE_SECRET_ACCESS_KEY }}
          YC_OBJECT_STORAGE_PREFIX: ${{ secrets.YC_OBJECT_STORAGE_PREFIX }}
          CATALOG_IMAGE_CDN_URL: ${{ secrets.CATALOG_IMAGE_CDN_URL }}
          CATALOG_DAILY_SOURCE_IDS: ${{ github.event_name == 'push' && 'otomoto_europe_exact' || '' }}
          CATALOG_TARGET_PER_MARKET: "250"
          CATALOG_TARGET_PUBLIC_OFFERS: "1250"
          CATALOG_MAX_IMAGES_PER_OFFER: "30"
          CATALOG_IMPORT_BUDGET_MS: "14400000"
          CATALOG_SOURCE_BUDGET_MS: "2100000"
          CATALOG_GENERATION_RETENTION_MS: "259200000"
          CATALOG_STALE_GRACE_MS: "259200000"
          CATALOG_OFFER_RETENTION_MS: "259200000"
          CATALOG_SOURCE_RETRY_MS: "300000"
          CATALOG_SOURCE_TIMEOUT_MS: "60000"
          CATALOG_IMAGE_TIMEOUT_MS: "45000"
          CATALOG_IMAGE_MAX_BYTES: "12000000"
          CATALOG_IMAGE_FETCH_CONCURRENCY: "6"
          CATALOG_INDEX_WRITE_CONCURRENCY: "10"
          CATALOG_GROW_ONLY_MARKETS: ""
          CATALOG_DAILY_LOCAL_REPORT: catalog-daily-report.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: catalog-daily-report
          path: catalog-daily-report.json
          if-no-files-found: warn
          retention-days: 3
