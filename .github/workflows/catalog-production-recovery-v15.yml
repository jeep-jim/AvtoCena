name: Catalog clean rebuild all five markets

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/catalog-production-recovery-v15.yml
      - scripts/catalog-rebuild-market.mjs
      - scripts/catalog-publish-fresh.mjs
      - apps/web/lib/catalog/importer.ts
      - apps/web/lib/catalog/full-gallery-wrapper.ts
      - apps/web/lib/catalog/offer-quality.ts
      - apps/web/lib/catalog/spec-normalization.ts
      - apps/web/lib/catalog/adapters.ts
      - apps/web/lib/catalog/encar-complete-source.ts
      - apps/web/lib/catalog/guazi-export-source.ts
      - apps/web/lib/catalog/goonet-exact-source.ts
      - apps/web/lib/catalog/dubicars-current-source.ts
      - apps/web/lib/catalog/otomoto-current-source.ts
      - apps/web/lib/catalog/otomoto-detail-source.ts
      - apps/web/lib/catalog/che168-exact-source.ts
  schedule:
    - cron: "17 20 * * *"

permissions:
  contents: read

concurrency:
  group: catalog-production-import
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  collect:
    needs: validate
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        market: [korea, china, japan, uae, europe]
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Collect 260 clean ${{ matrix.market }} offers with complete galleries
        run: npx tsx scripts/catalog-rebuild-market.mjs
        env:
          JSON_STORAGE_DRIVER: object
          YC_OBJECT_STORAGE_ENDPOINT: ${{ secrets.YC_OBJECT_STORAGE_ENDPOINT }}
          YC_OBJECT_STORAGE_REGION: ${{ secrets.YC_OBJECT_STORAGE_REGION }}
          YC_OBJECT_STORAGE_BUCKET: ${{ secrets.YC_OBJECT_STORAGE_BUCKET }}
          YC_OBJECT_STORAGE_ACCESS_KEY_ID: ${{ secrets.YC_OBJECT_STORAGE_ACCESS_KEY_ID }}
          YC_OBJECT_STORAGE_SECRET_ACCESS_KEY: ${{ secrets.YC_OBJECT_STORAGE_SECRET_ACCESS_KEY }}
          YC_OBJECT_STORAGE_PREFIX: ${{ secrets.YC_OBJECT_STORAGE_PREFIX }}
          CATALOG_IMAGE_CDN_URL: ${{ secrets.CATALOG_IMAGE_CDN_URL }}
          CATALOG_REBUILD_MARKET: ${{ matrix.market }}
          CATALOG_REBUILD_TARGET: "260"
          CATALOG_REBUILD_MAX_PAGES: "300"
          CATALOG_REBUILD_OUTPUT: catalog-rebuild-${{ matrix.market }}.json
          CATALOG_MAX_IMAGES_PER_OFFER: "120"
          CATALOG_IMAGE_MAX_BYTES: "12000000"
          CATALOG_SOURCE_TIMEOUT_MS: "60000"
          CATALOG_IMAGE_TIMEOUT_MS: "45000"
          CATALOG_IMAGE_FETCH_CONCURRENCY: "8"
          CATALOG_ENCAR_DIRECT_PAGE_SIZE: "50"
          CATALOG_ENCAR_DIRECT_LIST_RPM: "30"
          CATALOG_ENCAR_DIRECT_DETAIL_RPM: "120"
          CATALOG_ENCAR_DIRECT_IMAGE_RPM: "120"
          CATALOG_CHE168_GLOBAL_PAGE_SIZE: "64"
          CATALOG_CHE168_GLOBAL_MAX_BRANDS: "64"
          CATALOG_GROW_ONLY_MARKETS: ""
      - uses: actions/upload-artifact@v4
        with:
          name: catalog-rebuild-${{ matrix.market }}
          path: catalog-rebuild-${{ matrix.market }}.json
          if-no-files-found: error
          retention-days: 3

  publish:
    needs: collect
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          pattern: catalog-rebuild-*
          path: catalog-rebuild
          merge-multiple: true
      - name: Atomically replace the public catalog with five fresh markets
        run: npx tsx scripts/catalog-publish-fresh.mjs
        env:
          JSON_STORAGE_DRIVER: object
          YC_OBJECT_STORAGE_ENDPOINT: ${{ secrets.YC_OBJECT_STORAGE_ENDPOINT }}
          YC_OBJECT_STORAGE_REGION: ${{ secrets.YC_OBJECT_STORAGE_REGION }}
          YC_OBJECT_STORAGE_BUCKET: ${{ secrets.YC_OBJECT_STORAGE_BUCKET }}
          YC_OBJECT_STORAGE_ACCESS_KEY_ID: ${{ secrets.YC_OBJECT_STORAGE_ACCESS_KEY_ID }}
          YC_OBJECT_STORAGE_SECRET_ACCESS_KEY: ${{ secrets.YC_OBJECT_STORAGE_SECRET_ACCESS_KEY }}
          YC_OBJECT_STORAGE_PREFIX: ${{ secrets.YC_OBJECT_STORAGE_PREFIX }}
          CATALOG_IMAGE_CDN_URL: ${{ secrets.CATALOG_IMAGE_CDN_URL }}
          CATALOG_REBUILD_INPUT_DIR: catalog-rebuild
          CATALOG_REBUILD_TARGET: "250"
          CATALOG_REBUILD_MIN_AVG_IMAGES: "8"
          CATALOG_REBUILD_RICH_GALLERY_IMAGES: "6"
          CATALOG_REBUILD_RICH_GALLERY_RATIO: "0.60"
          CATALOG_REBUILD_MIN_SPEC_SCORE: "5"
          CATALOG_REBUILD_PUBLISH_REPORT: catalog-fresh-publish-report.json
          CATALOG_GROW_ONLY_MARKETS: ""
          CATALOG_INDEX_WRITE_CONCURRENCY: "10"
      - uses: actions/upload-artifact@v4
        with:
          name: catalog-fresh-publish-report
          path: catalog-fresh-publish-report.json
          if-no-files-found: error
          retention-days: 14
