name: Catalog canonical five-market rebuild

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/catalog-production-recovery-v15.yml

permissions:
  contents: write

concurrency:
  group: catalog-canonical-rebuild
  cancel-in-progress: false

jobs:
  restore:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: node --check scripts/catalog-recover-generations.mjs
      - name: Restore confirmed working catalog including Japan
        run: npx tsx scripts/catalog-recover-generations.mjs | tee catalog-restore-report.log
        env:
          JSON_STORAGE_DRIVER: object
          YC_OBJECT_STORAGE_ENDPOINT: ${{ secrets.YC_OBJECT_STORAGE_ENDPOINT }}
          YC_OBJECT_STORAGE_REGION: ${{ secrets.YC_OBJECT_STORAGE_REGION }}
          YC_OBJECT_STORAGE_BUCKET: ${{ secrets.YC_OBJECT_STORAGE_BUCKET }}
          YC_OBJECT_STORAGE_ACCESS_KEY_ID: ${{ secrets.YC_OBJECT_STORAGE_ACCESS_KEY_ID }}
          YC_OBJECT_STORAGE_SECRET_ACCESS_KEY: ${{ secrets.YC_OBJECT_STORAGE_SECRET_ACCESS_KEY }}
          YC_OBJECT_STORAGE_PREFIX: ${{ secrets.YC_OBJECT_STORAGE_PREFIX }}
          CATALOG_IMAGE_CDN_URL: ${{ secrets.CATALOG_IMAGE_CDN_URL }}
          CATALOG_RECOVERY_MARKETS: korea,china,japan,uae,europe
          CATALOG_RECOVERY_GENERATIONS: gen_1784276049832_9868cbbe
          CATALOG_RECOVERY_MAX_CHUNKS: "50"
          CATALOG_RECOVERY_FORCE: "true"
          CATALOG_GROW_ONLY_MARKETS: ""
          CATALOG_INDEX_WRITE_CONCURRENCY: "10"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: catalog-restore-report
          path: catalog-restore-report.log
          if-no-files-found: warn
          retention-days: 7

  collect:
    needs: restore
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        include:
          - market: korea
            sourceIds: encar_direct
          - market: china
            sourceIds: che168_china_exact,guazi_china_export
          - market: japan
            sourceIds: goonet_japan_exact,beforward_japan,beforward_public
          - market: uae
            sourceIds: dubicars_uae_exact,beforward_uae
          - market: europe
            sourceIds: otomoto_europe_exact,beforward_uk,beforward_belgium
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Validate clean rebuild scripts
        run: |
          node --check scripts/catalog-rebuild-market.mjs
          node --check scripts/catalog-publish-fresh.mjs
      - name: Collect 270 verified ${{ matrix.market }} offers from their own detail pages
        run: npx tsx scripts/catalog-rebuild-market.mjs
        env:
          JSON_STORAGE_DRIVER: object
          YC_OBJECT_STORAGE_ENDPOINT: ${{ secrets.YC_OBJECT_STORAGE_ENDPOINT }}
          YC_OBJECT_STORAGE_REGION: ${{ secrets.YC_OBJECT_STORAGE_REGION }}
          YC_OBJECT_STORAGE_BUCKET: ${{ secrets.YC_OBJECT_STORAGE_BUCKET }}
          YC_OBJECT_STORAGE_ACCESS_KEY_ID: ${{ secrets.YC_OBJECT_STORAGE_ACCESS_KEY_ID }}
          YC_OBJECT_STORAGE_SECRET_ACCESS_KEY: ${{ secrets.YC_OBJECT_STORAGE_SECRET_ACCESS_KEY }}
          YC_OBJECT_STORAGE_PREFIX: ${{ secrets.YC_OBJECT_STORAGE_PREFIX }}
          CATALOG_IMAGE_CDN_URL: ${{ secrets.CATALOG_IMAGE_CDN_URL }}
          CATALOG_REBUILD_MARKET: ${{ matrix.market }}
          CATALOG_REBUILD_SOURCE_IDS: ${{ matrix.sourceIds }}
          CATALOG_REBUILD_TARGET: "270"
          CATALOG_REBUILD_MAX_PAGES: "500"
          CATALOG_REBUILD_SEED_SCAN_LIMIT: "1500"
          CATALOG_REBUILD_OUTPUT: catalog-rebuild-${{ matrix.market }}.json
          CATALOG_REBUILD_MIN_IMAGES_PER_OFFER: "4"
          CATALOG_MAX_IMAGES_PER_OFFER: "1000"
          CATALOG_IMAGE_MAX_BYTES: "12000000"
          CATALOG_SOURCE_TIMEOUT_MS: "60000"
          CATALOG_IMAGE_TIMEOUT_MS: "45000"
          CATALOG_IMAGE_FETCH_CONCURRENCY: "8"
          CATALOG_ENCAR_DIRECT_PAGE_SIZE: "50"
          CATALOG_ENCAR_DIRECT_LIST_RPM: "30"
          CATALOG_ENCAR_DIRECT_DETAIL_RPM: "120"
          CATALOG_ENCAR_DIRECT_IMAGE_RPM: "120"
          CATALOG_BEFORWARD_PUBLIC_LIST_RPM: "20"
          CATALOG_BEFORWARD_PUBLIC_IMAGE_RPM: "60"
          CATALOG_CHE168_GLOBAL_PAGE_SIZE: "64"
          CATALOG_CHE168_GLOBAL_MAX_BRANDS: "64"
          CATALOG_GROW_ONLY_MARKETS: ""
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: catalog-rebuild-${{ matrix.market }}
          path: catalog-rebuild-${{ matrix.market }}.json
          if-no-files-found: error
          retention-days: 3

  publish:
    needs: collect
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          pattern: catalog-rebuild-*
          path: catalog-rebuild
          merge-multiple: true
      - name: Atomically replace the public catalog with five verified markets
        run: npx tsx scripts/catalog-publish-fresh.mjs
        env:
          JSON_STORAGE_DRIVER: object
          YC_OBJECT_STORAGE_ENDPOINT: ${{ secrets.YC_OBJECT_STORAGE_ENDPOINT }}
          YC_OBJECT_STORAGE_REGION: ${{ secrets.YC_OBJECT_STORAGE_REGION }}
          YC_OBJECT_STORAGE_BUCKET: ${{ secrets.YC_OBJECT_STORAGE_BUCKET }}
          YC_OBJECT_STORAGE_ACCESS_KEY_ID: ${{ secrets.YC_OBJECT_STORAGE_ACCESS_KEY_ID }}
          YC_OBJECT_STORAGE_SECRET_ACCESS_KEY: ${{ secrets.YC_OBJECT_STORAGE_SECRET_ACCESS_KEY }}
          YC_OBJECT_STORAGE_PREFIX: ${{ secrets.YC_OBJECT_STORAGE_PREFIX }}
          CATALOG_IMAGE_CDN_URL: ${{ secrets.CATALOG_IMAGE_CDN_URL }}
          CATALOG_REBUILD_INPUT_DIR: catalog-rebuild
          CATALOG_REBUILD_TARGET: "250"
          CATALOG_REBUILD_MIN_IMAGES_PER_OFFER: "4"
          CATALOG_REBUILD_MIN_AVG_IMAGES: "4"
          CATALOG_REBUILD_RICH_GALLERY_IMAGES: "4"
          CATALOG_REBUILD_RICH_GALLERY_RATIO: "0"
          CATALOG_REBUILD_MIN_SPEC_SCORE: "5"
          CATALOG_REBUILD_PUBLISH_REPORT: catalog-fresh-publish-report.json
          CATALOG_GROW_ONLY_MARKETS: ""
          CATALOG_INDEX_WRITE_CONCURRENCY: "10"
      - name: Record completed catalog generation
        run: |
          mkdir -p data/catalog/imports
          cp catalog-fresh-publish-report.json data/catalog/imports/last-complete-five-market-rebuild.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add data/catalog/imports/last-complete-five-market-rebuild.json
          git commit -m "Record completed five-market rebuild [skip ci]" || exit 0
          git push origin HEAD:main
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: catalog-fresh-publish-report
          path: catalog-fresh-publish-report.json
          if-no-files-found: error
          retention-days: 14
