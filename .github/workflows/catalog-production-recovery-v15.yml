name: Catalog safe restore and full galleries

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/catalog-production-recovery-v15.yml
      - apps/web/lib/catalog/offer-quality.ts
      - apps/web/lib/catalog/importer.ts
      - apps/web/lib/catalog/full-gallery-wrapper.ts
      - scripts/catalog-recover-generations.mjs
      - scripts/catalog-refresh-galleries.mjs
  schedule:
    - cron: "17 20 * * *"

permissions:
  contents: write

concurrency:
  group: catalog-production-import
  cancel-in-progress: true

jobs:
  restore-and-enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run typecheck

      - name: Restore the complete last working catalog first
        run: npx tsx scripts/catalog-recover-generations.mjs
        env: &storage
          JSON_STORAGE_DRIVER: object
          YC_OBJECT_STORAGE_ENDPOINT: ${{ secrets.YC_OBJECT_STORAGE_ENDPOINT }}
          YC_OBJECT_STORAGE_REGION: ${{ secrets.YC_OBJECT_STORAGE_REGION }}
          YC_OBJECT_STORAGE_BUCKET: ${{ secrets.YC_OBJECT_STORAGE_BUCKET }}
          YC_OBJECT_STORAGE_ACCESS_KEY_ID: ${{ secrets.YC_OBJECT_STORAGE_ACCESS_KEY_ID }}
          YC_OBJECT_STORAGE_SECRET_ACCESS_KEY: ${{ secrets.YC_OBJECT_STORAGE_SECRET_ACCESS_KEY }}
          YC_OBJECT_STORAGE_PREFIX: ${{ secrets.YC_OBJECT_STORAGE_PREFIX }}
          CATALOG_IMAGE_CDN_URL: ${{ secrets.CATALOG_IMAGE_CDN_URL }}
          CATALOG_RECOVERY_MARKETS: korea,china,japan,uae,europe
          CATALOG_RECOVERY_GENERATIONS: gen_1784276049832_9868cbbe
          CATALOG_RECOVERY_MAX_CHUNKS: "50"
          CATALOG_RECOVERY_MIN_GAIN: "1"
          CATALOG_GROW_ONLY_MARKETS: ""

      - name: Expand a safe batch of galleries without removing working photos
        run: npx tsx scripts/catalog-refresh-galleries.mjs
        env:
          <<: *storage
          CATALOG_GALLERY_MARKETS: korea,china,japan,uae,europe
          CATALOG_GALLERY_MAX_OFFERS: "250"
          CATALOG_GALLERY_MAX_PER_MARKET: "60"
          CATALOG_GALLERY_MIN_IMAGES: "120"
          CATALOG_MAX_IMAGES_PER_OFFER: "120"
          CATALOG_GALLERY_PERSIST_EVERY: "10"
          CATALOG_SOURCE_TIMEOUT_MS: "45000"
          CATALOG_IMAGE_TIMEOUT_MS: "30000"
          CATALOG_GALLERY_REPORT_FILE: catalog-safe-gallery-refresh.json
          CATALOG_GROW_ONLY_MARKETS: ""

      - name: Record safe refresh report
        if: always()
        run: |
          mkdir -p data/catalog/imports
          if [ ! -f catalog-safe-gallery-refresh.json ]; then
            printf '{"finishedAt":"%s","error":"gallery_report_missing"}\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > catalog-safe-gallery-refresh.json
          fi
          cp catalog-safe-gallery-refresh.json data/catalog/imports/last-safe-gallery-refresh.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add data/catalog/imports/last-safe-gallery-refresh.json
          git commit -m "Record safe catalog gallery refresh [skip ci]" || true
          git push origin HEAD:main || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: catalog-safe-gallery-refresh
          path: catalog-safe-gallery-refresh.json
          if-no-files-found: warn
          retention-days: 7
