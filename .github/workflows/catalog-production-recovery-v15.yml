name: Catalog finish China + Europe and publish

# One recovery pass only. Korea, Japan and UAE are reused from successful run 29695322406.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/catalog-production-recovery-v15.yml

permissions:
  contents: read
  actions: read

concurrency:
  group: catalog-canonical-rebuild
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: |
          node --check scripts/catalog-rebuild-market.mjs
          node --check scripts/catalog-publish-fresh.mjs

  collect:
    needs: validate
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - market: china
            sourceIds: guazi_china_export,che168_china_exact
            imageConcurrency: "4"
          - market: europe
            sourceIds: otomoto_europe_exact
            imageConcurrency: "2"
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Collect 250 verified ${{ matrix.market }} offers from exact listing pages
        run: npx tsx scripts/catalog-rebuild-market.mjs
        env:
          JSON_STORAGE_DRIVER: object
          YC_OBJECT_STORAGE_ENDPOINT: ${{ secrets.YC_OBJECT_STORAGE_ENDPOINT }}
          YC_OBJECT_STORAGE_REGION: ${{ secrets.YC_OBJECT_STORAGE_REGION }}
          YC_OBJECT_STORAGE_BUCKET: ${{ secrets.YC_OBJECT_STORAGE_BUCKET }}
          YC_OBJECT_STORAGE_ACCESS_KEY_ID: ${{ secrets.YC_OBJECT_STORAGE_ACCESS_KEY_ID }}
          YC_OBJECT_STORAGE_SECRET_ACCESS_KEY: ${{ secrets.YC_OBJECT_STORAGE_SECRET_ACCESS_KEY }}
          YC_OBJECT_STORAGE_PREFIX: ${{ secrets.YC_OBJECT_STORAGE_PREFIX }}
          CATALOG_IMAGE_CDN_URL: ${{ secrets.CATALOG_IMAGE_CDN_URL }}
          CATALOG_REBUILD_MARKET: ${{ matrix.market }}
          CATALOG_REBUILD_SOURCE_IDS: ${{ matrix.sourceIds }}
          CATALOG_REBUILD_TARGET: "250"
          CATALOG_REBUILD_MAX_PAGES: "500"
          CATALOG_REBUILD_SEED_SCAN_LIMIT: "1500"
          CATALOG_REBUILD_OUTPUT: catalog-rebuild-${{ matrix.market }}.json
          CATALOG_REBUILD_MIN_IMAGES_PER_OFFER: "4"
          CATALOG_MAX_IMAGES_PER_OFFER: "30"
          CATALOG_IMAGE_MAX_BYTES: "12000000"
          CATALOG_SOURCE_TIMEOUT_MS: "60000"
          CATALOG_IMAGE_TIMEOUT_MS: "45000"
          CATALOG_IMAGE_FETCH_CONCURRENCY: ${{ matrix.imageConcurrency }}
          CATALOG_CHE168_GLOBAL_PAGE_SIZE: "64"
          CATALOG_CHE168_GLOBAL_MAX_BRANDS: "64"
          CATALOG_GROW_ONLY_MARKETS: ""
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: catalog-rebuild-${{ matrix.market }}
          path: catalog-rebuild-${{ matrix.market }}.json
          if-no-files-found: error
          retention-days: 3

  publish:
    needs: collect
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci

      - name: Download newly rebuilt China and Europe
        uses: actions/download-artifact@v4
        with:
          pattern: catalog-rebuild-*
          path: catalog-rebuild
          merge-multiple: true

      - name: Reuse successful Korea artifact
        uses: actions/download-artifact@v4
        with:
          name: catalog-rebuild-korea
          path: catalog-rebuild
          repository: jeep-jim/AvtoCena
          run-id: 29695322406
          github-token: ${{ github.token }}

      - name: Reuse successful Japan artifact
        uses: actions/download-artifact@v4
        with:
          name: catalog-rebuild-japan
          path: catalog-rebuild
          repository: jeep-jim/AvtoCena
          run-id: 29695322406
          github-token: ${{ github.token }}

      - name: Reuse successful UAE artifact
        uses: actions/download-artifact@v4
        with:
          name: catalog-rebuild-uae
          path: catalog-rebuild
          repository: jeep-jim/AvtoCena
          run-id: 29695322406
          github-token: ${{ github.token }}

      - name: Verify all five artifact files exist
        run: |
          test -s catalog-rebuild/catalog-rebuild-korea.json
          test -s catalog-rebuild/catalog-rebuild-china.json
          test -s catalog-rebuild/catalog-rebuild-japan.json
          test -s catalog-rebuild/catalog-rebuild-uae.json
          test -s catalog-rebuild/catalog-rebuild-europe.json
          ls -lh catalog-rebuild

      - name: Atomically publish 250 offers for every market
        run: npx tsx scripts/catalog-publish-fresh.mjs
        env:
          JSON_STORAGE_DRIVER: object
          YC_OBJECT_STORAGE_ENDPOINT: ${{ secrets.YC_OBJECT_STORAGE_ENDPOINT }}
          YC_OBJECT_STORAGE_REGION: ${{ secrets.YC_OBJECT_STORAGE_REGION }}
          YC_OBJECT_STORAGE_BUCKET: ${{ secrets.YC_OBJECT_STORAGE_BUCKET }}
          YC_OBJECT_STORAGE_ACCESS_KEY_ID: ${{ secrets.YC_OBJECT_STORAGE_ACCESS_KEY_ID }}
          YC_OBJECT_STORAGE_SECRET_ACCESS_KEY: ${{ secrets.YC_OBJECT_STORAGE_SECRET_ACCESS_KEY }}
          YC_OBJECT_STORAGE_PREFIX: ${{ secrets.YC_OBJECT_STORAGE_PREFIX }}
          CATALOG_IMAGE_CDN_URL: ${{ secrets.CATALOG_IMAGE_CDN_URL }}
          CATALOG_REBUILD_INPUT_DIR: catalog-rebuild
          CATALOG_REBUILD_TARGET: "250"
          CATALOG_REBUILD_MIN_IMAGES_PER_OFFER: "4"
          CATALOG_REBUILD_MIN_AVG_IMAGES: "4"
          CATALOG_REBUILD_RICH_GALLERY_IMAGES: "4"
          CATALOG_REBUILD_RICH_GALLERY_RATIO: "0"
          CATALOG_REBUILD_MIN_SPEC_SCORE: "5"
          CATALOG_REBUILD_PUBLISH_REPORT: catalog-fresh-publish-report.json
          CATALOG_GROW_ONLY_MARKETS: ""
          CATALOG_INDEX_WRITE_CONCURRENCY: "10"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: catalog-fresh-publish-report
          path: catalog-fresh-publish-report.json
          if-no-files-found: error
          retention-days: 14
