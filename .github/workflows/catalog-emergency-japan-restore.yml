name: Emergency restore Japan catalog

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/catalog-emergency-japan-restore.yml

permissions:
  contents: write

concurrency:
  group: catalog-emergency-japan-restore
  cancel-in-progress: true

jobs:
  restore:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Record emergency restore start
        run: |
          mkdir -p data/catalog/imports
          printf 'startedAt=%s\ncommit=%s\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)" "$GITHUB_SHA" > data/catalog/imports/emergency-japan-restore-started.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/catalog/imports/emergency-japan-restore-started.txt
          git commit -m "Record emergency Japan restore start [skip ci]" || true
          git push origin HEAD:main
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Restore last working catalog generation
        run: npx tsx scripts/catalog-recover-generations.mjs | tee catalog-emergency-restore-report.log
        env:
          JSON_STORAGE_DRIVER: object
          YC_OBJECT_STORAGE_ENDPOINT: ${{ secrets.YC_OBJECT_STORAGE_ENDPOINT }}
          YC_OBJECT_STORAGE_REGION: ${{ secrets.YC_OBJECT_STORAGE_REGION }}
          YC_OBJECT_STORAGE_BUCKET: ${{ secrets.YC_OBJECT_STORAGE_BUCKET }}
          YC_OBJECT_STORAGE_ACCESS_KEY_ID: ${{ secrets.YC_OBJECT_STORAGE_ACCESS_KEY_ID }}
          YC_OBJECT_STORAGE_SECRET_ACCESS_KEY: ${{ secrets.YC_OBJECT_STORAGE_SECRET_ACCESS_KEY }}
          YC_OBJECT_STORAGE_PREFIX: ${{ secrets.YC_OBJECT_STORAGE_PREFIX }}
          CATALOG_IMAGE_CDN_URL: ${{ secrets.CATALOG_IMAGE_CDN_URL }}
          CATALOG_RECOVERY_MARKETS: korea,china,japan,uae,europe
          CATALOG_RECOVERY_GENERATIONS: gen_1784276049832_9868cbbe
          CATALOG_RECOVERY_MAX_CHUNKS: "50"
          CATALOG_RECOVERY_MIN_GAIN: "1"
          CATALOG_GROW_ONLY_MARKETS: ""
          CATALOG_INDEX_WRITE_CONCURRENCY: "10"
      - name: Record emergency restore result
        if: always()
        run: |
          mkdir -p data/catalog/imports
          if [ -f catalog-emergency-restore-report.log ]; then
            cp catalog-emergency-restore-report.log data/catalog/imports/emergency-japan-restore-result.log
          else
            printf 'restore report missing at %s\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > data/catalog/imports/emergency-japan-restore-result.log
          fi
          git pull --rebase origin main
          git add data/catalog/imports/emergency-japan-restore-result.log
          git commit -m "Record emergency Japan restore result [skip ci]" || true
          git push origin HEAD:main
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: emergency-japan-restore-report
          path: catalog-emergency-restore-report.log
          if-no-files-found: warn
          retention-days: 7
