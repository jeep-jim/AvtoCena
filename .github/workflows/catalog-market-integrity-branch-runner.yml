name: Finalize catalog market safeguards

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/catalog-market-integrity-branch-runner.yml
      - .github/catalog-market-integrity-trigger

permissions:
  contents: write

concurrency:
  group: finalize-catalog-market-safeguards
  cancel-in-progress: true

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Record visible start marker
        run: |
          mkdir -p data/catalog/imports
          printf '{\n  "status": "running",\n  "task": "catalog-market-safeguards-v15",\n  "startedAt": "%s"\n}\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > data/catalog/imports/catalog-safeguard-status.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/catalog/imports/catalog-safeguard-status.json
          git commit -m "Start catalog market safeguards v15 [skip ci]"
          git push origin HEAD:main

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - name: Patch verified market safeguards
        run: |
          python - <<'PY'
          from pathlib import Path

          filters = Path('apps/web/components/catalog/CatalogFilters.tsx')
          value = filters.read_text(encoding='utf-8')
          old = '{ value: "suv", label: "Кроссовер" }, { value: "sedan", label: "Седан" }'
          new = '{ value: "suv", label: "Кроссовер" }, { value: "offroad", label: "Внедорожник" }, { value: "sedan", label: "Седан" }'
          if old not in value:
              raise SystemExit('offroad target not found')
          filters.write_text(value.replace(old, new, 1), encoding='utf-8')

          workflow = Path('.github/workflows/catalog-production-recovery-once-v2.yml')
          value = workflow.read_text(encoding='utf-8')
          if 'name: Catalog exact markets fill v14' not in value:
              raise SystemExit('v14 target not found')
          value = value.replace('name: Catalog exact markets fill v14', 'name: Catalog exact markets fill v15', 1)
          source_path = '      - apps/web/lib/catalog/exact-market-sources.ts\n'
          source_paths = '''      - apps/web/lib/catalog/exact-market-sources.ts
      - apps/web/lib/catalog/storage.ts
      - apps/web/lib/catalog/offer-quality.ts
      - apps/web/lib/catalog/spec-normalization.ts
      - apps/web/components/catalog/CatalogFilters.tsx
      - apps/web/components/home/HomePageClient.tsx
      - apps/web/app/(public)/cars/page.tsx
      - scripts/catalog-recover-generations.mjs
'''
          if source_path not in value:
              raise SystemExit('source paths target not found')
          value = value.replace(source_path, source_paths, 1)
          npm_step = '      - run: npm ci\n\n      - name: Create one-market exact filler\n'
          recovery = '''      - run: npm ci

      - name: Restore protected Korea from confirmed catalog history
        run: npx tsx scripts/catalog-recover-generations.mjs
        env:
          JSON_STORAGE_DRIVER: object
          YC_OBJECT_STORAGE_ENDPOINT: ${{ secrets.YC_OBJECT_STORAGE_ENDPOINT }}
          YC_OBJECT_STORAGE_REGION: ${{ secrets.YC_OBJECT_STORAGE_REGION }}
          YC_OBJECT_STORAGE_BUCKET: ${{ secrets.YC_OBJECT_STORAGE_BUCKET }}
          YC_OBJECT_STORAGE_ACCESS_KEY_ID: ${{ secrets.YC_OBJECT_STORAGE_ACCESS_KEY_ID }}
          YC_OBJECT_STORAGE_SECRET_ACCESS_KEY: ${{ secrets.YC_OBJECT_STORAGE_SECRET_ACCESS_KEY }}
          YC_OBJECT_STORAGE_PREFIX: ${{ secrets.YC_OBJECT_STORAGE_PREFIX }}
          CATALOG_RECOVERY_MARKETS: korea
          CATALOG_RECOVERY_MAX_CHUNKS: "30"
          CATALOG_RECOVERY_MIN_GAIN: "1"
          CATALOG_GROW_ONLY_MARKETS: korea

      - name: Create one-market exact filler
'''
          if npm_step not in value:
              raise SystemExit('recovery insertion target not found')
          value = value.replace(npm_step, recovery, 1)
          value = value.replace('version: 14', 'version: 15')
          value = value.replace('Start exact market fill v14', 'Start exact market fill v15')
          value = value.replace('catalog-exact-markets-v14', 'catalog-exact-markets-v15')
          value = value.replace('CATALOG_EXACT_MAX_PAGES: "4"', 'CATALOG_EXACT_MAX_PAGES: "20"')
          value = value.replace('CATALOG_EXACT_MAX_PAGES: "12"', 'CATALOG_EXACT_MAX_PAGES: "24"')
          value = value.replace('CATALOG_EXACT_MAX_PAGES: "16"', 'CATALOG_EXACT_MAX_PAGES: "24"')
          workflow.write_text(value, encoding='utf-8')
          PY

      - run: npm run typecheck
      - run: npm test
      - run: npm run build

      - name: Commit verified changes and remove temporary files
        run: |
          rm -f .github/workflows/catalog-market-integrity-branch-runner.yml
          rm -f .github/catalog-market-integrity-trigger
          rm -f data/catalog/imports/catalog-safeguard-status.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/web/components/catalog/CatalogFilters.tsx
          git add .github/workflows/catalog-production-recovery-once-v2.yml
          git add -u .github/workflows/catalog-market-integrity-branch-runner.yml
          git add -u .github/catalog-market-integrity-trigger
          git add -u data/catalog/imports/catalog-safeguard-status.json
          git commit -m "Restore protected Korea and launch exact market fill v15"
          git push origin HEAD:main
