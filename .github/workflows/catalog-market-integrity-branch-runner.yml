name: Run catalog integrity patch branch

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/catalog-market-integrity-branch-runner.yml

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/catalog-market-integrity-62
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Add recovery and final market safeguards
        run: |
          python - <<'PY'
          from pathlib import Path

          filters = Path('apps/web/components/catalog/CatalogFilters.tsx')
          text = filters.read_text(encoding='utf-8')
          old = '{ value: "suv", label: "Кроссовер" }, { value: "sedan", label: "Седан" }'
          if old not in text:
            raise SystemExit('offroad filter target missing')
          filters.write_text(text.replace(old, '{ value: "suv", label: "Кроссовер" }, { value: "offroad", label: "Внедорожник" }, { value: "sedan", label: "Седан" }', 1), encoding='utf-8')

          workflow = Path('.github/workflows/catalog-production-recovery-once-v2.yml')
          text = workflow.read_text(encoding='utf-8')
          text = text.replace('name: Catalog exact markets fill v14', 'name: Catalog exact markets fill v15', 1)
          trigger = '      - apps/web/lib/catalog/exact-market-sources.ts\n'
          additions = '''      - apps/web/lib/catalog/exact-market-sources.ts
      - apps/web/lib/catalog/storage.ts
      - apps/web/lib/catalog/offer-quality.ts
      - apps/web/lib/catalog/spec-normalization.ts
      - apps/web/components/catalog/CatalogFilters.tsx
      - apps/web/components/home/HomePageClient.tsx
      - apps/web/app/(public)/cars/page.tsx
      - scripts/catalog-recover-generations.mjs
'''
          if trigger not in text:
            raise SystemExit('workflow trigger target missing')
          text = text.replace(trigger, additions, 1)
          npm = '      - run: npm ci\n\n      - name: Create one-market exact filler\n'
          restore = '''      - run: npm ci

      - name: Restore protected Korea from confirmed catalog history
        run: npx tsx scripts/catalog-recover-generations.mjs
        env:
          JSON_STORAGE_DRIVER: object
          YC_OBJECT_STORAGE_ENDPOINT: ${{ secrets.YC_OBJECT_STORAGE_ENDPOINT }}
          YC_OBJECT_STORAGE_REGION: ${{ secrets.YC_OBJECT_STORAGE_REGION }}
          YC_OBJECT_STORAGE_BUCKET: ${{ secrets.YC_OBJECT_STORAGE_BUCKET }}
          YC_OBJECT_STORAGE_ACCESS_KEY_ID: ${{ secrets.YC_OBJECT_STORAGE_ACCESS_KEY_ID }}
          YC_OBJECT_STORAGE_SECRET_ACCESS_KEY: ${{ secrets.YC_OBJECT_STORAGE_SECRET_ACCESS_KEY }}
          YC_OBJECT_STORAGE_PREFIX: ${{ secrets.YC_OBJECT_STORAGE_PREFIX }}
          CATALOG_RECOVERY_MARKETS: korea
          CATALOG_RECOVERY_MAX_CHUNKS: "30"
          CATALOG_RECOVERY_MIN_GAIN: "1"
          CATALOG_GROW_ONLY_MARKETS: korea

      - name: Create one-market exact filler
'''
          if npm not in text:
            raise SystemExit('workflow restore insertion target missing')
          text = text.replace(npm, restore, 1)
          text = text.replace('version: 14', 'version: 15')
          text = text.replace('Start exact market fill v14', 'Start exact market fill v15')
          text = text.replace('catalog-exact-markets-v14', 'catalog-exact-markets-v15')
          text = text.replace('CATALOG_EXACT_MAX_PAGES: "4"', 'CATALOG_EXACT_MAX_PAGES: "20"')
          text = text.replace('CATALOG_EXACT_MAX_PAGES: "12"', 'CATALOG_EXACT_MAX_PAGES: "24"')
          text = text.replace('CATALOG_EXACT_MAX_PAGES: "16"', 'CATALOG_EXACT_MAX_PAGES: "24"')
          workflow.write_text(text, encoding='utf-8')
          PY
      - name: Typecheck
        run: npm run typecheck
      - name: Tests
        run: npm test
      - name: Build
        run: npm run build
      - name: Commit verified branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Restore protected Korea and run exact market fill v15 [skip ci]"
          git push origin HEAD:fix/catalog-market-integrity-62
