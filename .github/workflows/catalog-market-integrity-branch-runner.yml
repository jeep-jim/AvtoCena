name: Run catalog integrity patch branch

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/catalog-market-integrity-branch-runner.yml

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/catalog-market-integrity-62
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Update quality test fixture
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('tests/catalog.test.ts')
          text = path.read_text(encoding='utf-8')
          old = 'size: 10, checksum: "abc"'
          if old not in text:
            raise SystemExit('test fixture target missing')
          path.write_text(text.replace(old, 'size: 10_000, checksum: "abc"', 1), encoding='utf-8')
          PY
      - name: Typecheck
        run: npm run typecheck
      - name: Tests
        run: npm test
      - name: Build
        run: npm run build
      - name: Commit verified branch
        run: |
          rm -f scripts/apply-catalog-market-integrity-patch.py .github/workflows/catalog-market-integrity-patch-once.yml data/catalog/imports/catalog-integrity-branch-diagnostic.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Protect market data and expose live catalog facets [skip ci]"
          git push origin HEAD:fix/catalog-market-integrity-62
