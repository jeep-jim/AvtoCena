name: Catalog recovery once v2

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/catalog-production-recovery-once-v2.yml

permissions:
  contents: write

concurrency:
  group: catalog-production-import
  cancel-in-progress: false

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 220
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Remove local test catalog
        run: |
          rm -rf data/catalog/internal data/catalog/generations data/catalog/scans data/catalog/health data/catalog/imports data/catalog/sources
          rm -f data/catalog/manifest.json data/catalog/import-lock.json
      - name: Recover last confirmed production generation
        run: npx tsx scripts/catalog-recover-generations.mjs
        env:
          JSON_STORAGE_DRIVER: object
          YC_OBJECT_STORAGE_ENDPOINT: ${{ secrets.YC_OBJECT_STORAGE_ENDPOINT }}
          YC_OBJECT_STORAGE_REGION: ${{ secrets.YC_OBJECT_STORAGE_REGION }}
          YC_OBJECT_STORAGE_BUCKET: ${{ secrets.YC_OBJECT_STORAGE_BUCKET }}
          YC_OBJECT_STORAGE_ACCESS_KEY_ID: ${{ secrets.YC_OBJECT_STORAGE_ACCESS_KEY_ID }}
          YC_OBJECT_STORAGE_SECRET_ACCESS_KEY: ${{ secrets.YC_OBJECT_STORAGE_SECRET_ACCESS_KEY }}
          YC_OBJECT_STORAGE_PREFIX: ${{ secrets.YC_OBJECT_STORAGE_PREFIX }}
          CATALOG_RECOVERY_GENERATIONS: gen_1784276049832_9868cbbe
          CATALOG_RECOVERY_MAX_CHUNKS: "20"
          CATALOG_RECOVERY_MIN_GAIN: "5"
      - name: Reactivate recent valid offers
        run: npx tsx scripts/catalog-recover-active.mjs
        env:
          JSON_STORAGE_DRIVER: object
          YC_OBJECT_STORAGE_ENDPOINT: ${{ secrets.YC_OBJECT_STORAGE_ENDPOINT }}
          YC_OBJECT_STORAGE_REGION: ${{ secrets.YC_OBJECT_STORAGE_REGION }}
          YC_OBJECT_STORAGE_BUCKET: ${{ secrets.YC_OBJECT_STORAGE_BUCKET }}
          YC_OBJECT_STORAGE_ACCESS_KEY_ID: ${{ secrets.YC_OBJECT_STORAGE_ACCESS_KEY_ID }}
          YC_OBJECT_STORAGE_SECRET_ACCESS_KEY: ${{ secrets.YC_OBJECT_STORAGE_SECRET_ACCESS_KEY }}
          YC_OBJECT_STORAGE_PREFIX: ${{ secrets.YC_OBJECT_STORAGE_PREFIX }}
          CATALOG_RECOVERY_WINDOW_MS: "3888000000"
          CATALOG_RECOVERY_MIN_PUBLIC: "2"
      - name: Restart verified source cursors
        run: npx tsx scripts/catalog-reset-underfilled-scans.mjs
        env:
          JSON_STORAGE_DRIVER: object
          YC_OBJECT_STORAGE_ENDPOINT: ${{ secrets.YC_OBJECT_STORAGE_ENDPOINT }}
          YC_OBJECT_STORAGE_REGION: ${{ secrets.YC_OBJECT_STORAGE_REGION }}
          YC_OBJECT_STORAGE_BUCKET: ${{ secrets.YC_OBJECT_STORAGE_BUCKET }}
          YC_OBJECT_STORAGE_ACCESS_KEY_ID: ${{ secrets.YC_OBJECT_STORAGE_ACCESS_KEY_ID }}
          YC_OBJECT_STORAGE_SECRET_ACCESS_KEY: ${{ secrets.YC_OBJECT_STORAGE_SECRET_ACCESS_KEY }}
          YC_OBJECT_STORAGE_PREFIX: ${{ secrets.YC_OBJECT_STORAGE_PREFIX }}
          CATALOG_IMPORT_SOURCES: encar_direct,che168_china_exact,jpauc_japan,dubicars_uae_exact,otomoto_europe_exact,che168_global,goonet_japan_exact,dubicars_uae,autoscout_europe,autouncle_europe
      - name: Import verified five-market catalog
        run: npm run catalog:import:sample
        env:
          JSON_STORAGE_DRIVER: object
          YC_OBJECT_STORAGE_ENDPOINT: ${{ secrets.YC_OBJECT_STORAGE_ENDPOINT }}
          YC_OBJECT_STORAGE_REGION: ${{ secrets.YC_OBJECT_STORAGE_REGION }}
          YC_OBJECT_STORAGE_BUCKET: ${{ secrets.YC_OBJECT_STORAGE_BUCKET }}
          YC_OBJECT_STORAGE_ACCESS_KEY_ID: ${{ secrets.YC_OBJECT_STORAGE_ACCESS_KEY_ID }}
          YC_OBJECT_STORAGE_SECRET_ACCESS_KEY: ${{ secrets.YC_OBJECT_STORAGE_SECRET_ACCESS_KEY }}
          YC_OBJECT_STORAGE_PREFIX: ${{ secrets.YC_OBJECT_STORAGE_PREFIX }}
          CATALOG_IMPORT_RESET: "false"
          CATALOG_IMPORT_SOURCES: encar_direct,che168_china_exact,jpauc_japan,dubicars_uae_exact,otomoto_europe_exact,che168_global,goonet_japan_exact,dubicars_uae,autoscout_europe,autouncle_europe
          CATALOG_TARGET_PUBLIC_OFFERS: "1250"
          CATALOG_TARGET_PER_MARKET: "250"
          CATALOG_ENCAR_DIRECT_PAGE_SIZE: "64"
          CATALOG_ENCAR_DIRECT_LIST_RPM: "30"
          CATALOG_ENCAR_DIRECT_DETAIL_RPM: "240"
          CATALOG_ENCAR_DIRECT_IMAGE_RPM: "600"
          CATALOG_CHE168_GLOBAL_PAGE_SIZE: "64"
          CATALOG_CHE168_GLOBAL_MAX_BRANDS: "48"
          CATALOG_IMPORT_MAX_OFFERS: "250"
          CATALOG_IMPORT_MAX_DETAILS: "250"
          CATALOG_IMPORT_MAX_PAGES: "30"
          CATALOG_MAX_IMAGES_PER_OFFER: "10"
          CATALOG_SOURCE_TIMEOUT_MS: "35000"
          CATALOG_IMAGE_TIMEOUT_MS: "20000"
          CATALOG_IMPORT_BUDGET_MS: "10800000"
          CATALOG_SOURCE_BUDGET_MS: "1800000"
          CATALOG_OFFER_RETENTION_MS: "3888000000"
          CATALOG_STALE_GRACE_MS: "3888000000"
          CATALOG_IMPORT_REPORT_FILE: catalog-import-public-markets-report.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: catalog-recovery-once-v2-report
          path: catalog-import-public-markets-report.json
          if-no-files-found: warn
          retention-days: 7
      - name: Record report in repository
        if: always()
        run: |
          if [ ! -f catalog-import-public-markets-report.json ]; then exit 0; fi
          mkdir -p data/catalog/imports
          cp catalog-import-public-markets-report.json data/catalog/imports/last-recovery-v2-report.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/catalog/imports/last-recovery-v2-report.json
          git commit -m "Record catalog recovery v2 report [skip ci]" || exit 0
          git push origin HEAD:main
      - name: Summary
        if: always()
        run: |
          node - <<'NODE' >> "$GITHUB_STEP_SUMMARY"
          const fs = require('fs');
          const path = 'catalog-import-public-markets-report.json';
          if (!fs.existsSync(path)) { console.log('Отчёт не создан.'); process.exit(0); }
          const r = JSON.parse(fs.readFileSync(path, 'utf8'));
          console.log(`Всего: ${r.publicOffers || 0}`);
          for (const market of ['korea','china','japan','uae','europe']) console.log(`- ${market}: ${r.publicByMarket?.[market] || 0}`);
          console.log('\n### Источники');
          for (const s of r.sources || []) console.log(`- ${s.sourceId}: ${s.ok ? `OK seen=${s.seen || 0} saved=${s.saved || 0}` : `ERROR ${s.error || ''}`}`);
          NODE
