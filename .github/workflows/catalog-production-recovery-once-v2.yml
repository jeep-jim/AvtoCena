name: Catalog exact markets fill v12

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/catalog-production-recovery-once-v2.yml
      - apps/web/lib/catalog/guazi-export-source.ts
      - apps/web/lib/catalog/otomoto-current-source.ts
      - apps/web/lib/catalog/otomoto-detail-source.ts
      - apps/web/lib/catalog/dubicars-current-source.ts
      - apps/web/lib/catalog/exact-market-sources.ts

permissions:
  contents: write

concurrency:
  group: catalog-underfilled-recovery-v9
  cancel-in-progress: true

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Restart exact source cursors and clear stale import lock
        run: npx tsx scripts/catalog-reset-underfilled-scans.mjs
        env: &storage
          JSON_STORAGE_DRIVER: object
          YC_OBJECT_STORAGE_ENDPOINT: ${{ secrets.YC_OBJECT_STORAGE_ENDPOINT }}
          YC_OBJECT_STORAGE_REGION: ${{ secrets.YC_OBJECT_STORAGE_REGION }}
          YC_OBJECT_STORAGE_BUCKET: ${{ secrets.YC_OBJECT_STORAGE_BUCKET }}
          YC_OBJECT_STORAGE_ACCESS_KEY_ID: ${{ secrets.YC_OBJECT_STORAGE_ACCESS_KEY_ID }}
          YC_OBJECT_STORAGE_SECRET_ACCESS_KEY: ${{ secrets.YC_OBJECT_STORAGE_SECRET_ACCESS_KEY }}
          YC_OBJECT_STORAGE_PREFIX: ${{ secrets.YC_OBJECT_STORAGE_PREFIX }}
          CATALOG_IMPORT_SOURCES: dubicars_uae_exact,otomoto_europe_exact,guazi_china_export
      - name: Create direct exact-source filler
        run: |
          cat > scripts/catalog-exact-fill-runtime.mjs <<'NODE'
          const fs = await import('node:fs/promises');
          const { exactMarketSources } = await import('../apps/web/lib/catalog/exact-market-sources.ts');
          const { catalogImportSources, importCatalog } = await import('../apps/web/lib/catalog/importer.ts');
          const { mutateSourcePolicy } = await import('../apps/web/lib/catalog/policy.ts');
          const { isCrediblePublicOffer } = await import('../apps/web/lib/catalog/offer-quality.ts');
          const { readAllOffersForMaintenance } = await import('../apps/web/lib/catalog/storage.ts');

          for (const source of exactMarketSources) {
            const index = catalogImportSources.findIndex((item) => item.sourceId === source.sourceId);
            if (index >= 0) catalogImportSources[index] = source;
            else catalogImportSources.push(source);
          }

          const plans = [
            { market: 'uae', sourceId: 'dubicars_uae_exact', maxPages: 20 },
            { market: 'europe', sourceId: 'otomoto_europe_exact', maxPages: 30 },
            { market: 'china', sourceId: 'guazi_china_export', maxPages: 50 },
          ];
          const desired = 250;
          const countAll = (offers) => offers.filter(isCrediblePublicOffer).reduce((totals, offer) => {
            totals[offer.market] = (totals[offer.market] || 0) + 1;
            return totals;
          }, {});
          const reports = [];
          const startedAt = new Date().toISOString();

          for (const plan of plans) {
            const beforeCounts = countAll(await readAllOffersForMaintenance());
            const before = Number(beforeCounts[plan.market] || 0);
            const deficit = Math.max(0, desired - before);
            if (!deficit) {
              reports.push({ ...plan, before, after: before, deficit: 0, reached: true, skipped: true });
              continue;
            }

            const source = catalogImportSources.find((item) => item.sourceId === plan.sourceId);
            if (!source) {
              reports.push({ ...plan, before, after: before, deficit, reached: false, error: 'source_not_registered' });
              continue;
            }

            const candidateLimit = Math.min(600, Math.max(50, deficit * 2));
            process.env.CATALOG_TARGET_PER_MARKET = String(deficit);
            process.env.CATALOG_TARGET_PUBLIC_OFFERS = String(desired * 5);
            process.env.CATALOG_IMPORT_BUDGET_MS = String(65 * 60 * 1000);
            process.env.CATALOG_SOURCE_BUDGET_MS = String(60 * 60 * 1000);
            process.env.CATALOG_MAX_IMAGES_PER_OFFER = '3';
            process.env.CATALOG_PRESERVE_PREVIOUS_ON_FAILURE = 'true';
            process.env.CATALOG_OFFER_RETENTION_MS = String(45 * 24 * 60 * 60 * 1000);
            process.env.CATALOG_STALE_GRACE_MS = String(45 * 24 * 60 * 60 * 1000);

            await mutateSourcePolicy(source, (policy) => ({
              ...policy,
              enabled: true,
              blockedUntil: undefined,
              consecutiveFailures: 0,
              maxPagesPerRun: Math.max(Number(policy.maxPagesPerRun || 0), plan.maxPages),
              maxOffersPerRun: Math.max(Number(policy.maxOffersPerRun || 0), candidateLimit),
              maxDetailsPerRun: Math.max(Number(policy.maxDetailsPerRun || 0), candidateLimit),
              imagesEnabled: true,
            }));

            const result = await importCatalog({
              sourceIds: [plan.sourceId],
              maxOffers: candidateLimit,
              maxDetails: candidateLimit,
              maxImagesPerOffer: 3,
              maxPages: plan.maxPages,
              requireObjectStorage: true,
              failOnZeroSaved: false,
              reportPath: `catalog/imports/latest-${plan.market}-exact-fill.json`,
            }).catch((error) => ({ imported: 0, updated: 0, sources: [], error: error?.message || String(error) }));

            const afterCounts = countAll(await readAllOffersForMaintenance());
            const after = Number(afterCounts[plan.market] || 0);
            const marketReport = {
              ...plan,
              before,
              after,
              deficit,
              candidateLimit,
              gained: Math.max(0, after - before),
              reached: after >= desired,
              imported: Number(result.imported || 0),
              updated: Number(result.updated || 0),
              rejectedByQuality: Number(result.rejectedByQuality || 0),
              imageFailures: Number(result.imageFailures || 0),
              deadlineReached: Boolean(result.deadlineReached),
              error: result.error,
              sources: result.sources || [],
            };
            reports.push(marketReport);
            await fs.writeFile(`catalog-${plan.market}-progress.json`, JSON.stringify(marketReport, null, 2));
          }

          const publicByMarket = countAll(await readAllOffersForMaintenance());
          const report = {
            startedAt,
            finishedAt: new Date().toISOString(),
            desiredPerMarket: desired,
            publicByMarket,
            missingByMarket: Object.fromEntries(['korea','china','japan','uae','europe'].map((market) => [market, Math.max(0, desired - Number(publicByMarket[market] || 0))])),
            markets: reports,
          };
          await fs.writeFile('catalog-underfilled-markets-report.json', JSON.stringify(report, null, 2));
          console.log(JSON.stringify(report, null, 2));
          NODE
          node --check scripts/catalog-exact-fill-runtime.mjs
      - name: Fill UAE Europe and China from exact sources
        shell: bash
        run: |
          set +e
          npx tsx scripts/catalog-exact-fill-runtime.mjs 2>&1 | tee catalog-underfilled-markets.log
          status=${PIPESTATUS[0]}
          if [ ! -f catalog-underfilled-markets-report.json ]; then
            STATUS="$status" node - <<'NODE'
          const fs = require('fs');
          fs.writeFileSync('catalog-underfilled-markets-report.json', JSON.stringify({
            fatal: true,
            exitCode: Number(process.env.STATUS || 1),
            message: 'Exact market fill stopped before the final report. See log artifact.'
          }, null, 2));
          NODE
          fi
          exit 0
        env:
          <<: *storage
          CATALOG_SOURCE_TIMEOUT_MS: "35000"
          CATALOG_IMAGE_TIMEOUT_MS: "12000"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: catalog-exact-markets-v12
          path: |
            catalog-underfilled-markets-report.json
            catalog-underfilled-markets.log
            catalog-*-progress.json
          if-no-files-found: warn
          retention-days: 7
      - name: Record final report in repository
        if: always()
        run: |
          if [ ! -f catalog-underfilled-markets-report.json ]; then exit 0; fi
          mkdir -p data/catalog/imports
          cp catalog-underfilled-markets-report.json data/catalog/imports/last-underfilled-markets-report.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/catalog/imports/last-underfilled-markets-report.json
          git commit -m "Record exact market fill v12 report [skip ci]" || exit 0
          git push origin HEAD:main
      - name: Summary
        if: always()
        run: |
          node - <<'NODE' >> "$GITHUB_STEP_SUMMARY"
          const fs = require('fs');
          const report = JSON.parse(fs.readFileSync('catalog-underfilled-markets-report.json', 'utf8'));
          console.log(`Fatal: ${Boolean(report.fatal)}`);
          for (const market of ['uae','europe','china']) {
            console.log(`- ${market}: ${report.publicByMarket?.[market] || 0}; missing ${report.missingByMarket?.[market] || 0}`);
          }
          for (const market of report.markets || []) {
            console.log(`\n### ${market.market}: ${market.before || 0} -> ${market.after || 0}`);
            for (const source of market.sources || []) console.log(`- ${source.sourceId}: ${source.ok ? `OK seen=${source.seen || 0} saved=${source.saved || 0}` : `ERROR ${source.error || ''}`}`);
          }
          NODE
