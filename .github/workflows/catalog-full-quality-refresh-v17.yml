name: Cancel obsolete catalog rebuild queue

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/catalog-full-quality-refresh-v17.yml

permissions:
  contents: read

concurrency:
  group: catalog-production-import
  cancel-in-progress: true

jobs:
  cancel-old-runs:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Obsolete catalog fillers have been superseded by the all-market recovery."
