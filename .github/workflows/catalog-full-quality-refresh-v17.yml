name: Catalog full quality refresh v17

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/catalog-full-quality-refresh-v17.yml

permissions:
  contents: write

concurrency:
  group: catalog-production-import
  cancel-in-progress: true

jobs:
  refresh-market:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - market: korea
            source: encar_direct
            desired: 500
            candidates: 650
            pages: 20
          - market: japan
            source: goonet_japan_exact
            desired: 250
            candidates: 360
            pages: 48
          - market: china
            source: guazi_china_export
            desired: 250
            candidates: 360
            pages: 48
          - market: uae
            source: dubicars_uae_exact
            desired: 250
            candidates: 340
            pages: 20
          - market: europe
            source: otomoto_europe_exact
            desired: 500
            candidates: 650
            pages: 48

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Reset selected source cursor
        run: npx tsx scripts/catalog-reset-underfilled-scans.mjs
        env:
          JSON_STORAGE_DRIVER: object
          YC_OBJECT_STORAGE_ENDPOINT: ${{ secrets.YC_OBJECT_STORAGE_ENDPOINT }}
          YC_OBJECT_STORAGE_REGION: ${{ secrets.YC_OBJECT_STORAGE_REGION }}
          YC_OBJECT_STORAGE_BUCKET: ${{ secrets.YC_OBJECT_STORAGE_BUCKET }}
          YC_OBJECT_STORAGE_ACCESS_KEY_ID: ${{ secrets.YC_OBJECT_STORAGE_ACCESS_KEY_ID }}
          YC_OBJECT_STORAGE_SECRET_ACCESS_KEY: ${{ secrets.YC_OBJECT_STORAGE_SECRET_ACCESS_KEY }}
          YC_OBJECT_STORAGE_PREFIX: ${{ secrets.YC_OBJECT_STORAGE_PREFIX }}
          CATALOG_IMPORT_SOURCES: ${{ matrix.source }}

      - name: Rebuild ${{ matrix.market }} from exact source
        run: |
          cat > scripts/catalog-full-quality-refresh-v17.mjs <<'NODE'
          const fs = await import('node:fs/promises');
          const market = String(process.env.REFRESH_MARKET || '');
          const sourceId = String(process.env.REFRESH_SOURCE || '');
          const desired = Math.max(1, Number(process.env.REFRESH_DESIRED || 250));
          const candidateLimit = Math.max(desired, Number(process.env.REFRESH_CANDIDATES || desired));
          const maxPages = Math.max(1, Number(process.env.REFRESH_PAGES || 20));
          const minimumImages = 4;
          const requiredSpecScore = 5;
          const startedAt = new Date().toISOString();
          const output = `catalog-quality-refresh-${market}-v17.json`;

          const { catalogImportSources, importCatalog } = await import('../apps/web/lib/catalog/importer.ts');
          const { mutateSourcePolicy } = await import('../apps/web/lib/catalog/policy.ts');
          const { isCrediblePublicOffer } = await import('../apps/web/lib/catalog/offer-quality.ts');
          const { persistCatalogOffers, readAllOffersForMaintenance } = await import('../apps/web/lib/catalog/storage.ts');

          function specScore(offer) {
            const fuel = String(offer?.fuel || '').trim();
            const electric = /electric|bev|электро|纯电|전기/i.test(fuel);
            return [
              Number(offer?.mileageKm || 0) >= 0,
              Boolean(fuel),
              Boolean(String(offer?.transmission || '').trim()),
              Boolean(String(offer?.drive || '').trim()),
              Boolean(String(offer?.bodyType || '').trim()),
              electric || Number(offer?.engineCc || 0) > 0,
              Number(offer?.powerHp || offer?.powerKw || 0) > 0,
            ].filter(Boolean).length;
          }

          function sourceFreshness(offer) {
            return Date.parse(String(offer?.operational?.sourcePublishedAt || offer?.updatedAt || offer?.firstSeenAt || '')) || 0;
          }

          async function write(report) {
            await fs.writeFile(output, JSON.stringify(report, null, 2));
            console.log(JSON.stringify(report, null, 2));
          }

          async function main() {
            if (!market || !sourceId) throw new Error('refresh_market_or_source_missing');
            const source = catalogImportSources.find((item) => item.sourceId === sourceId);
            if (!source) throw new Error(`source_not_registered_${sourceId}`);

            // Never clear an existing market until its exact source has returned real rows.
            const preflight = await source.fetchPage(null);
            if (!Array.isArray(preflight?.items) || preflight.items.length < 1) throw new Error(`preflight_zero_${sourceId}`);

            process.env.CATALOG_GROW_ONLY_MARKETS = '';
            process.env.CATALOG_MAX_IMAGES_PER_OFFER = '8';
            const beforeAll = await readAllOffersForMaintenance();
            const previousTarget = beforeAll.filter((offer) => String(offer.market) === market);
            const otherMarkets = beforeAll.filter((offer) => String(offer.market) !== market);
            const resetAt = new Date().toISOString();
            const resetTarget = previousTarget.map((offer) => ({
              ...offer,
              status: 'stale',
              images: [],
              engineCc: undefined,
              powerHp: undefined,
              powerKw: undefined,
              fuel: undefined,
              transmission: undefined,
              drive: undefined,
              bodyType: undefined,
              color: undefined,
              operational: {
                ...offer.operational,
                qualityRefreshResetAt: resetAt,
                galleryVerified: false,
                galleryImageCount: 0,
              },
            }));
            await persistCatalogOffers([...otherMarkets, ...resetTarget]);

            process.env.CATALOG_TARGET_PER_MARKET = String(candidateLimit);
            process.env.CATALOG_TARGET_PUBLIC_OFFERS = '2500';
            process.env.CATALOG_IMPORT_BUDGET_MS = String(320 * 60 * 1000);
            process.env.CATALOG_SOURCE_BUDGET_MS = String(310 * 60 * 1000);
            process.env.CATALOG_OFFER_RETENTION_MS = String(45 * 24 * 60 * 60 * 1000);
            process.env.CATALOG_STALE_GRACE_MS = String(45 * 24 * 60 * 60 * 1000);

            await mutateSourcePolicy(source, (policy) => ({
              ...policy,
              enabled: true,
              blockedUntil: undefined,
              consecutiveFailures: 0,
              maxPagesPerRun: Math.max(Number(policy.maxPagesPerRun || 0), maxPages),
              maxOffersPerRun: Math.max(Number(policy.maxOffersPerRun || 0), candidateLimit),
              maxDetailsPerRun: Math.max(Number(policy.maxDetailsPerRun || 0), candidateLimit),
              imagesEnabled: true,
            }));

            const result = await importCatalog({
              sourceIds: [sourceId],
              maxOffers: candidateLimit,
              maxDetails: candidateLimit,
              maxImagesPerOffer: 8,
              maxPages,
              requireObjectStorage: true,
              failOnZeroSaved: false,
              reportPath: `catalog/imports/latest-${market}-quality-refresh-v17.json`,
            });

            const afterImport = await readAllOffersForMaintenance();
            const refreshedTarget = afterImport
              .filter((offer) => String(offer.market) === market)
              .filter((offer) => isCrediblePublicOffer(offer))
              .filter((offer) => Array.isArray(offer.images) && offer.images.length >= minimumImages)
              .filter((offer) => specScore(offer) >= requiredSpecScore)
              .sort((left, right) => sourceFreshness(right) - sourceFreshness(left));
            const cleanTarget = refreshedTarget.slice(0, desired);
            const afterOtherMarkets = afterImport.filter((offer) => String(offer.market) !== market);

            let restoredPrevious = false;
            if (cleanTarget.length) {
              await persistCatalogOffers([...afterOtherMarkets, ...cleanTarget]);
            } else {
              // A temporary source failure must not leave a whole market empty.
              restoredPrevious = true;
              await persistCatalogOffers([...afterOtherMarkets, ...previousTarget]);
            }

            const finalAll = await readAllOffersForMaintenance();
            const finalTarget = finalAll.filter((offer) => String(offer.market) === market && isCrediblePublicOffer(offer));
            const imageCounts = finalTarget.map((offer) => Number(offer.images?.length || 0));
            const incompleteSpecs = finalTarget.filter((offer) => specScore(offer) < requiredSpecScore).length;
            await write({
              version: 17,
              market,
              sourceId,
              startedAt,
              finishedAt: new Date().toISOString(),
              before: previousTarget.filter((offer) => isCrediblePublicOffer(offer)).length,
              preflightRows: preflight.items.length,
              desired,
              candidateLimit,
              minimumImages,
              requiredSpecScore,
              imported: Number(result.imported || 0),
              updated: Number(result.updated || 0),
              rejectedByQuality: Number(result.rejectedByQuality || 0),
              imageFailures: Number(result.imageFailures || 0),
              underfilledImages: Number(result.underfilledImages || 0),
              cleanCandidates: refreshedTarget.length,
              finalPublic: finalTarget.length,
              minImages: imageCounts.length ? Math.min(...imageCounts) : 0,
              averageImages: imageCounts.length ? Number((imageCounts.reduce((sum, count) => sum + count, 0) / imageCounts.length).toFixed(2)) : 0,
              incompleteSpecs,
              restoredPrevious,
              generationId: result.generationId,
              sources: result.sources || [],
            });
          }

          main().catch(async (error) => {
            await write({ version: 17, market, sourceId, startedAt, finishedAt: new Date().toISOString(), fatal: true, error: error?.message || String(error) });
            process.exitCode = 1;
          });
          NODE
          npx tsx scripts/catalog-full-quality-refresh-v17.mjs 2>&1 | tee catalog-quality-refresh-${{ matrix.market }}-v17.log
        env:
          JSON_STORAGE_DRIVER: object
          YC_OBJECT_STORAGE_ENDPOINT: ${{ secrets.YC_OBJECT_STORAGE_ENDPOINT }}
          YC_OBJECT_STORAGE_REGION: ${{ secrets.YC_OBJECT_STORAGE_REGION }}
          YC_OBJECT_STORAGE_BUCKET: ${{ secrets.YC_OBJECT_STORAGE_BUCKET }}
          YC_OBJECT_STORAGE_ACCESS_KEY_ID: ${{ secrets.YC_OBJECT_STORAGE_ACCESS_KEY_ID }}
          YC_OBJECT_STORAGE_SECRET_ACCESS_KEY: ${{ secrets.YC_OBJECT_STORAGE_SECRET_ACCESS_KEY }}
          YC_OBJECT_STORAGE_PREFIX: ${{ secrets.YC_OBJECT_STORAGE_PREFIX }}
          CATALOG_SOURCE_TIMEOUT_MS: "45000"
          CATALOG_IMAGE_TIMEOUT_MS: "18000"
          CATALOG_MAX_IMAGES_PER_OFFER: "8"
          CATALOG_ENCAR_DIRECT_PAGE_SIZE: "50"
          CATALOG_ENCAR_DIRECT_LIST_RPM: "8"
          CATALOG_ENCAR_DIRECT_DETAIL_RPM: "20"
          CATALOG_ENCAR_DIRECT_IMAGE_RPM: "20"
          REFRESH_MARKET: ${{ matrix.market }}
          REFRESH_SOURCE: ${{ matrix.source }}
          REFRESH_DESIRED: ${{ matrix.desired }}
          REFRESH_CANDIDATES: ${{ matrix.candidates }}
          REFRESH_PAGES: ${{ matrix.pages }}

      - name: Record ${{ matrix.market }} quality report
        if: always()
        run: |
          git pull --rebase origin main || true
          mkdir -p data/catalog/imports
          if [ ! -f catalog-quality-refresh-${{ matrix.market }}-v17.json ]; then
            echo '{"version":17,"market":"${{ matrix.market }}","fatal":true,"error":"report_missing"}' > catalog-quality-refresh-${{ matrix.market }}-v17.json
          fi
          cp catalog-quality-refresh-${{ matrix.market }}-v17.json data/catalog/imports/last-quality-refresh-${{ matrix.market }}-v17.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/catalog/imports/last-quality-refresh-${{ matrix.market }}-v17.json
          git commit -m "Record ${{ matrix.market }} quality refresh v17 [skip ci]" || true
          git push origin HEAD:main || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: catalog-quality-refresh-${{ matrix.market }}-v17
          path: |
            catalog-quality-refresh-${{ matrix.market }}-v17.json
            catalog-quality-refresh-${{ matrix.market }}-v17.log
          if-no-files-found: warn
          retention-days: 7
