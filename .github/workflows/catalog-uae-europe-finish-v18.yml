name: Catalog UAE Europe finish v18

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/catalog-uae-europe-finish-v18.yml

permissions:
  contents: write

concurrency:
  group: catalog-production-import
  cancel-in-progress: false

jobs:
  finish:
    runs-on: ubuntu-latest
    timeout-minutes: 190
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - name: Fix OTOMOTO year extraction
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('apps/web/lib/catalog/otomoto-current-source.ts')
          text = path.read_text(encoding='utf-8')
          old = 'const year=Number(plain.match(/(?:\\byear\\b\\s*)?\\b((?:19|20)\\d{2})\\b/i)?.[1]);'
          new = '''const labeledYear=plain.match(/\\byear\\s+((?:19|20)\\d{2})\\b/i)?.[1];const htmlYear=block.match(/(?:data-testid|aria-label)=['\"][^'\"]*year[^'\"]*['\"][^>]*>[\\s\\S]{0,240}?\\b((?:19|20)\\d{2})\\b/i)?.[1];const titleYear=parsed.title.match(/\\b((?:19|20)\\d{2})\\b/)?.[1];const year=Number(labeledYear||htmlYear||titleYear);'''
          if old in text:
              text = text.replace(old, new, 1)
          elif 'const labeledYear=' not in text:
              raise SystemExit('OTOMOTO year target not found')
          path.write_text(text, encoding='utf-8')
          PY

      - name: Verify code
        run: |
          npm run typecheck
          npm test
          npm run build

      - name: Commit year fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/web/lib/catalog/otomoto-current-source.ts
          git commit -m "Fix OTOMOTO listing year extraction [skip ci]" || true
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Reset exact UAE and Europe scans
        run: npx tsx scripts/catalog-reset-underfilled-scans.mjs
        env:
          JSON_STORAGE_DRIVER: object
          YC_OBJECT_STORAGE_ENDPOINT: ${{ secrets.YC_OBJECT_STORAGE_ENDPOINT }}
          YC_OBJECT_STORAGE_REGION: ${{ secrets.YC_OBJECT_STORAGE_REGION }}
          YC_OBJECT_STORAGE_BUCKET: ${{ secrets.YC_OBJECT_STORAGE_BUCKET }}
          YC_OBJECT_STORAGE_ACCESS_KEY_ID: ${{ secrets.YC_OBJECT_STORAGE_ACCESS_KEY_ID }}
          YC_OBJECT_STORAGE_SECRET_ACCESS_KEY: ${{ secrets.YC_OBJECT_STORAGE_SECRET_ACCESS_KEY }}
          YC_OBJECT_STORAGE_PREFIX: ${{ secrets.YC_OBJECT_STORAGE_PREFIX }}
          CATALOG_IMPORT_SOURCES: dubicars_uae_exact,otomoto_europe_exact

      - name: Fill UAE and refresh Europe
        run: |
          cat > scripts/catalog-uae-europe-finish-v18.mjs <<'NODE'
          const fs = await import('node:fs/promises');
          const { catalogImportSources, importCatalog } = await import('../apps/web/lib/catalog/importer.ts');
          const { exactMarketSources } = await import('../apps/web/lib/catalog/exact-market-sources.ts');
          const { mutateSourcePolicy } = await import('../apps/web/lib/catalog/policy.ts');
          const { isCrediblePublicOffer } = await import('../apps/web/lib/catalog/offer-quality.ts');
          const { readAllOffersForMaintenance } = await import('../apps/web/lib/catalog/storage.ts');
          for (const source of exactMarketSources) {
            const index = catalogImportSources.findIndex((item) => item.sourceId === source.sourceId);
            if (index >= 0) catalogImportSources[index] = source;
            else catalogImportSources.push(source);
          }
          const markets = ['japan','korea','china','uae','europe'];
          const counts = (offers) => Object.fromEntries(markets.map((market) => [market, offers.filter((offer) => offer.market === market && isCrediblePublicOffer(offer)).length]));
          const before = counts(await readAllOffersForMaintenance());
          const runs = [];
          async function run(market, sourceId, maxOffers, maxPages, minutes) {
            const source = catalogImportSources.find((item) => item.sourceId === sourceId);
            if (!source) throw new Error(`missing_${sourceId}`);
            await mutateSourcePolicy(source, (policy) => ({ ...policy, enabled: true, blockedUntil: undefined, consecutiveFailures: 0, maxPagesPerRun: Math.max(Number(policy.maxPagesPerRun || 0), maxPages), maxOffersPerRun: Math.max(Number(policy.maxOffersPerRun || 0), maxOffers), maxDetailsPerRun: Math.max(Number(policy.maxDetailsPerRun || 0), maxOffers), imagesEnabled: true }));
            process.env.CATALOG_TARGET_PER_MARKET = '250';
            process.env.CATALOG_IMPORT_BUDGET_MS = String(minutes * 60000);
            process.env.CATALOG_SOURCE_BUDGET_MS = String((minutes - 5) * 60000);
            process.env.CATALOG_MAX_IMAGES_PER_OFFER = '3';
            const result = await importCatalog({ sourceIds: [sourceId], maxOffers, maxDetails: maxOffers, maxImagesPerOffer: 3, maxPages, requireObjectStorage: true, failOnZeroSaved: false, reportPath: `catalog/imports/latest-${market}-finish-v18.json` });
            runs.push({ market, sourceId, imported: result.imported, updated: result.updated, rejectedByQuality: result.rejectedByQuality, imageFailures: result.imageFailures, publicByMarket: result.publicByMarket, sources: result.sources });
          }
          await run('uae', 'dubicars_uae_exact', 700, 45, 70);
          await run('europe', 'otomoto_europe_exact', 600, 40, 75);
          const after = counts(await readAllOffersForMaintenance());
          const report = { version:18, before, after, runs, reached250:Object.fromEntries(markets.map((market)=>[market,Number(after[market]||0)>=250])), finishedAt:new Date().toISOString() };
          await fs.writeFile('catalog-uae-europe-finish-v18.json', JSON.stringify(report, null, 2));
          console.log(JSON.stringify(report, null, 2));
          NODE
          npx tsx scripts/catalog-uae-europe-finish-v18.mjs 2>&1 | tee catalog-uae-europe-finish-v18.log
        env:
          JSON_STORAGE_DRIVER: object
          YC_OBJECT_STORAGE_ENDPOINT: ${{ secrets.YC_OBJECT_STORAGE_ENDPOINT }}
          YC_OBJECT_STORAGE_REGION: ${{ secrets.YC_OBJECT_STORAGE_REGION }}
          YC_OBJECT_STORAGE_BUCKET: ${{ secrets.YC_OBJECT_STORAGE_BUCKET }}
          YC_OBJECT_STORAGE_ACCESS_KEY_ID: ${{ secrets.YC_OBJECT_STORAGE_ACCESS_KEY_ID }}
          YC_OBJECT_STORAGE_SECRET_ACCESS_KEY: ${{ secrets.YC_OBJECT_STORAGE_SECRET_ACCESS_KEY }}
          YC_OBJECT_STORAGE_PREFIX: ${{ secrets.YC_OBJECT_STORAGE_PREFIX }}
          CATALOG_SOURCE_TIMEOUT_MS: "35000"
          CATALOG_IMAGE_TIMEOUT_MS: "12000"

      - name: Record result
        if: always()
        run: |
          if [ ! -f catalog-uae-europe-finish-v18.json ]; then echo '{"version":18,"fatal":true,"error":"report_missing"}' > catalog-uae-europe-finish-v18.json; fi
          rm -f scripts/catalog-uae-europe-finish-v18.mjs
          git pull --rebase origin main || true
          mkdir -p data/catalog/imports
          cp catalog-uae-europe-finish-v18.json data/catalog/imports/last-catalog-uae-europe-finish-v18.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/catalog/imports/last-catalog-uae-europe-finish-v18.json
          git commit -m "Record UAE Europe finish v18 [skip ci]" || true
          git push origin HEAD:main || true
