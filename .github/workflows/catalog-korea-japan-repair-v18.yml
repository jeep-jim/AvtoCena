name: Catalog Korea Japan repair v18

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - apps/web/lib/catalog/offer-quality.ts
      - apps/web/lib/catalog/rates.ts
      - apps/web/lib/catalog/importer-impl.ts

permissions:
  contents: write

concurrency:
  group: catalog-production-import
  cancel-in-progress: false

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 140
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - name: Reset Encar and Goo-net cursors
        run: npx tsx scripts/catalog-reset-underfilled-scans.mjs
        env:
          JSON_STORAGE_DRIVER: object
          YC_OBJECT_STORAGE_ENDPOINT: ${{ secrets.YC_OBJECT_STORAGE_ENDPOINT }}
          YC_OBJECT_STORAGE_REGION: ${{ secrets.YC_OBJECT_STORAGE_REGION }}
          YC_OBJECT_STORAGE_BUCKET: ${{ secrets.YC_OBJECT_STORAGE_BUCKET }}
          YC_OBJECT_STORAGE_ACCESS_KEY_ID: ${{ secrets.YC_OBJECT_STORAGE_ACCESS_KEY_ID }}
          YC_OBJECT_STORAGE_SECRET_ACCESS_KEY: ${{ secrets.YC_OBJECT_STORAGE_SECRET_ACCESS_KEY }}
          YC_OBJECT_STORAGE_PREFIX: ${{ secrets.YC_OBJECT_STORAGE_PREFIX }}
          CATALOG_IMPORT_SOURCES: encar_direct,goonet_japan_exact

      - name: Repair Korea and recalculate Japan
        run: |
          cat > scripts/catalog-korea-japan-repair-v18.mjs <<'NODE'
          const fs = await import('node:fs/promises');
          const { catalogImportSources, importCatalog } = await import('../apps/web/lib/catalog/importer.ts');
          const { exactMarketSources } = await import('../apps/web/lib/catalog/exact-market-sources.ts');
          const { mutateSourcePolicy } = await import('../apps/web/lib/catalog/policy.ts');
          const { isCrediblePublicOffer } = await import('../apps/web/lib/catalog/offer-quality.ts');
          const { readAllOffersForMaintenance } = await import('../apps/web/lib/catalog/storage.ts');
          for (const source of exactMarketSources) {
            const index = catalogImportSources.findIndex((item) => item.sourceId === source.sourceId);
            if (index >= 0) catalogImportSources[index] = source;
            else catalogImportSources.push(source);
          }
          const markets = ['japan','korea','china','uae','europe'];
          const counts = (offers) => Object.fromEntries(markets.map((market) => [market, offers.filter((offer) => offer.market === market && isCrediblePublicOffer(offer)).length]));
          const before = counts(await readAllOffersForMaintenance());
          const runs = [];
          async function run(market, sourceId, target, maxOffers, maxPages, minutes) {
            const source = catalogImportSources.find((item) => item.sourceId === sourceId);
            if (!source) throw new Error(`missing_${sourceId}`);
            await mutateSourcePolicy(source, (policy) => ({ ...policy, enabled: true, blockedUntil: undefined, consecutiveFailures: 0, maxPagesPerRun: Math.max(Number(policy.maxPagesPerRun || 0), maxPages), maxOffersPerRun: Math.max(Number(policy.maxOffersPerRun || 0), maxOffers), maxDetailsPerRun: Math.max(Number(policy.maxDetailsPerRun || 0), maxOffers), imagesEnabled: true }));
            process.env.CATALOG_TARGET_PER_MARKET = String(Math.max(1, target));
            process.env.CATALOG_IMPORT_BUDGET_MS = String(minutes * 60000);
            process.env.CATALOG_SOURCE_BUDGET_MS = String((minutes - 5) * 60000);
            process.env.CATALOG_MAX_IMAGES_PER_OFFER = '3';
            process.env.CATALOG_GROW_ONLY_MARKETS = 'korea';
            const result = await importCatalog({ sourceIds: [sourceId], maxOffers, maxDetails: maxOffers, maxImagesPerOffer: 3, maxPages, requireObjectStorage: true, failOnZeroSaved: false, reportPath: `catalog/imports/latest-${market}-repair-v18.json` });
            runs.push({ market, imported: result.imported, updated: result.updated, rejectedByQuality: result.rejectedByQuality, publicByMarket: result.publicByMarket, sources: result.sources });
          }
          const koreaDeficit = Math.max(0, 250 - Number(before.korea || 0));
          if (koreaDeficit) await run('korea', 'encar_direct', koreaDeficit, 450, 12, 45);
          await run('japan', 'goonet_japan_exact', 250, 420, 30, 65);
          const after = counts(await readAllOffersForMaintenance());
          const report = { version: 18, before, after, runs, reached250: Object.fromEntries(markets.map((market) => [market, Number(after[market] || 0) >= 250])), finishedAt: new Date().toISOString() };
          await fs.writeFile('catalog-korea-japan-repair-v18.json', JSON.stringify(report, null, 2));
          console.log(JSON.stringify(report, null, 2));
          NODE
          npx tsx scripts/catalog-korea-japan-repair-v18.mjs 2>&1 | tee catalog-korea-japan-repair-v18.log
        env:
          JSON_STORAGE_DRIVER: object
          YC_OBJECT_STORAGE_ENDPOINT: ${{ secrets.YC_OBJECT_STORAGE_ENDPOINT }}
          YC_OBJECT_STORAGE_REGION: ${{ secrets.YC_OBJECT_STORAGE_REGION }}
          YC_OBJECT_STORAGE_BUCKET: ${{ secrets.YC_OBJECT_STORAGE_BUCKET }}
          YC_OBJECT_STORAGE_ACCESS_KEY_ID: ${{ secrets.YC_OBJECT_STORAGE_ACCESS_KEY_ID }}
          YC_OBJECT_STORAGE_SECRET_ACCESS_KEY: ${{ secrets.YC_OBJECT_STORAGE_SECRET_ACCESS_KEY }}
          YC_OBJECT_STORAGE_PREFIX: ${{ secrets.YC_OBJECT_STORAGE_PREFIX }}
          CATALOG_SOURCE_TIMEOUT_MS: "35000"
          CATALOG_IMAGE_TIMEOUT_MS: "12000"
          CATALOG_ENCAR_DIRECT_PAGE_SIZE: "50"
          CATALOG_ENCAR_DIRECT_LIST_RPM: "20"
          CATALOG_ENCAR_DIRECT_DETAIL_RPM: "30"
          CATALOG_ENCAR_DIRECT_IMAGE_RPM: "30"
          CATALOG_GROW_ONLY_MARKETS: korea

      - name: Record result
        if: always()
        run: |
          if [ ! -f catalog-korea-japan-repair-v18.json ]; then echo '{"version":18,"fatal":true,"error":"report_missing"}' > catalog-korea-japan-repair-v18.json; fi
          rm -f scripts/catalog-korea-japan-repair-v18.mjs
          git pull --rebase origin main || true
          mkdir -p data/catalog/imports
          cp catalog-korea-japan-repair-v18.json data/catalog/imports/last-catalog-korea-japan-repair-v18.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/catalog/imports/last-catalog-korea-japan-repair-v18.json
          git commit -m "Record Korea Japan repair v18 [skip ci]" || true
          git push origin HEAD:main || true
