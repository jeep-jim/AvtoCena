name: Catalog Europe clean rebuild v20

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/catalog-final-five-market-ensure-v19.yml
      - apps/web/lib/catalog/otomoto-current-source.ts
      - apps/web/lib/catalog/otomoto-detail-source.ts

permissions:
  contents: write

concurrency:
  group: catalog-production-import
  cancel-in-progress: false

jobs:
  rebuild-europe:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - name: Reset Europe source cursor
        run: npx tsx scripts/catalog-reset-underfilled-scans.mjs
        env:
          JSON_STORAGE_DRIVER: object
          YC_OBJECT_STORAGE_ENDPOINT: ${{ secrets.YC_OBJECT_STORAGE_ENDPOINT }}
          YC_OBJECT_STORAGE_REGION: ${{ secrets.YC_OBJECT_STORAGE_REGION }}
          YC_OBJECT_STORAGE_BUCKET: ${{ secrets.YC_OBJECT_STORAGE_BUCKET }}
          YC_OBJECT_STORAGE_ACCESS_KEY_ID: ${{ secrets.YC_OBJECT_STORAGE_ACCESS_KEY_ID }}
          YC_OBJECT_STORAGE_SECRET_ACCESS_KEY: ${{ secrets.YC_OBJECT_STORAGE_SECRET_ACCESS_KEY }}
          YC_OBJECT_STORAGE_PREFIX: ${{ secrets.YC_OBJECT_STORAGE_PREFIX }}
          CATALOG_IMPORT_SOURCES: otomoto_europe_exact

      - name: Import clean Europe prices and quarantine legacy rows
        run: |
          cat > scripts/catalog-europe-clean-rebuild-v20.mjs <<'NODE'
          const fs = await import('node:fs/promises');
          const { catalogImportSources, importCatalog } = await import('../apps/web/lib/catalog/importer.ts');
          const { exactMarketSources } = await import('../apps/web/lib/catalog/exact-market-sources.ts');
          const { mutateSourcePolicy } = await import('../apps/web/lib/catalog/policy.ts');
          const { isCrediblePublicOffer } = await import('../apps/web/lib/catalog/offer-quality.ts');
          const { persistCatalogOffers, readAllOffersForMaintenance } = await import('../apps/web/lib/catalog/storage.ts');

          const sourceId = 'otomoto_europe_exact';
          const exactSource = exactMarketSources.find((source) => source.sourceId === sourceId);
          if (!exactSource) throw new Error('missing_otomoto_exact_source');
          const existingSourceIndex = catalogImportSources.findIndex((source) => source.sourceId === sourceId);
          if (existingSourceIndex >= 0) catalogImportSources[existingSourceIndex] = exactSource;
          else catalogImportSources.push(exactSource);

          await mutateSourcePolicy(exactSource, (policy) => ({
            ...policy,
            enabled: true,
            blockedUntil: undefined,
            consecutiveFailures: 0,
            maxPagesPerRun: Math.max(Number(policy.maxPagesPerRun || 0), 45),
            maxOffersPerRun: Math.max(Number(policy.maxOffersPerRun || 0), 500),
            maxDetailsPerRun: Math.max(Number(policy.maxDetailsPerRun || 0), 500),
            imagesEnabled: true,
          }));

          process.env.CATALOG_TARGET_PER_MARKET = '250';
          process.env.CATALOG_TARGET_PUBLIC_OFFERS = '1250';
          process.env.CATALOG_IMPORT_BUDGET_MS = String(70 * 60 * 1000);
          process.env.CATALOG_SOURCE_BUDGET_MS = String(65 * 60 * 1000);
          process.env.CATALOG_MAX_IMAGES_PER_OFFER = '3';
          process.env.CATALOG_PRESERVE_PREVIOUS_ON_FAILURE = 'true';
          process.env.CATALOG_GROW_ONLY_MARKETS = 'korea';

          const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
          const startedAt = new Date().toISOString();
          const runs = [];

          async function importPass(pass) {
            for (let attempt = 1; attempt <= 30; attempt++) {
              try {
                const result = await importCatalog({
                  sourceIds: [sourceId],
                  maxOffers: 500,
                  maxDetails: 500,
                  maxImagesPerOffer: 3,
                  maxPages: 45,
                  requireObjectStorage: true,
                  failOnZeroSaved: false,
                  reportPath: `catalog/imports/latest-europe-clean-v20-pass-${pass}.json`,
                });
                runs.push({
                  pass,
                  imported: result.imported,
                  updated: result.updated,
                  rejectedByQuality: result.rejectedByQuality,
                  imageFailures: result.imageFailures,
                  publicByMarket: result.publicByMarket,
                  sources: result.sources,
                });
                return;
              } catch (error) {
                const message = String(error?.message || error);
                if (!message.includes('catalog_import_locked') || attempt === 30) throw error;
                console.log(`[europe-v20] catalog locked, retry ${attempt}/30`);
                await sleep(60_000);
              }
            }
          }

          for (let pass = 1; pass <= 3; pass++) await importPass(pass);

          const afterImport = await readAllOffersForMaintenance();
          const cleanCutoff = Date.parse(startedAt);
          const cleanIds = new Set(afterImport
            .filter((offer) => offer.market === 'europe'
              && offer.sourceId === sourceId
              && Date.parse(String(offer.updatedAt || '')) >= cleanCutoff
              && Number(offer.sourcePrice || 0) > 0
              && ['PLN', 'EUR'].includes(String(offer.sourceCurrency || '').toUpperCase()))
            .map((offer) => offer.id));

          if (cleanIds.size < 80) throw new Error(`too_few_clean_europe_offers_${cleanIds.size}`);

          let quarantined = 0;
          const cleanedCatalog = afterImport.map((offer) => {
            if (offer.market !== 'europe' || offer.sourceId !== sourceId || cleanIds.has(offer.id) || offer.status !== 'active') return offer;
            quarantined++;
            return { ...offer, status: 'stale' };
          });
          await persistCatalogOffers(cleanedCatalog);

          const finalOffers = await readAllOffersForMaintenance();
          const publicEurope = finalOffers.filter((offer) => offer.market === 'europe' && isCrediblePublicOffer(offer));
          const repeated = new Map();
          for (const offer of publicEurope) {
            const key = `${offer.sourceCurrency}:${offer.sourcePrice}:${offer.totalRub}`;
            const rows = repeated.get(key) || [];
            rows.push({ id: offer.id, make: offer.make, model: offer.model, year: offer.year });
            repeated.set(key, rows);
          }
          const repeatedPrices = [...repeated.entries()]
            .filter(([, rows]) => rows.length >= 4)
            .map(([key, rows]) => ({ key, count: rows.length, rows: rows.slice(0, 20) }));

          const report = {
            version: 20,
            startedAt,
            finishedAt: new Date().toISOString(),
            cleanImported: cleanIds.size,
            quarantined,
            publicEurope: publicEurope.length,
            repeatedPrices,
            runs,
          };
          await fs.writeFile('catalog-europe-clean-rebuild-v20.json', JSON.stringify(report, null, 2));
          console.log(JSON.stringify(report, null, 2));
          NODE
          npx tsx scripts/catalog-europe-clean-rebuild-v20.mjs 2>&1 | tee catalog-europe-clean-rebuild-v20.log
        env:
          JSON_STORAGE_DRIVER: object
          YC_OBJECT_STORAGE_ENDPOINT: ${{ secrets.YC_OBJECT_STORAGE_ENDPOINT }}
          YC_OBJECT_STORAGE_REGION: ${{ secrets.YC_OBJECT_STORAGE_REGION }}
          YC_OBJECT_STORAGE_BUCKET: ${{ secrets.YC_OBJECT_STORAGE_BUCKET }}
          YC_OBJECT_STORAGE_ACCESS_KEY_ID: ${{ secrets.YC_OBJECT_STORAGE_ACCESS_KEY_ID }}
          YC_OBJECT_STORAGE_SECRET_ACCESS_KEY: ${{ secrets.YC_OBJECT_STORAGE_SECRET_ACCESS_KEY }}
          YC_OBJECT_STORAGE_PREFIX: ${{ secrets.YC_OBJECT_STORAGE_PREFIX }}
          CATALOG_SOURCE_TIMEOUT_MS: "35000"
          CATALOG_IMAGE_TIMEOUT_MS: "12000"

      - name: Record Europe rebuild report
        if: always()
        run: |
          if [ ! -f catalog-europe-clean-rebuild-v20.json ]; then
            printf '{"version":20,"fatal":true,"error":"report_missing","finishedAt":"%s"}\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > catalog-europe-clean-rebuild-v20.json
          fi
          rm -f scripts/catalog-europe-clean-rebuild-v20.mjs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for attempt in 1 2 3 4 5; do
            git pull --rebase origin main || true
            mkdir -p data/catalog/imports
            cp catalog-europe-clean-rebuild-v20.json data/catalog/imports/last-catalog-europe-clean-rebuild-v20.json
            git add data/catalog/imports/last-catalog-europe-clean-rebuild-v20.json
            git commit -m "Record clean Europe rebuild v20 [skip ci]" || true
            git push origin HEAD:main && break
            sleep 10
          done

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: catalog-europe-clean-rebuild-v20
          path: |
            catalog-europe-clean-rebuild-v20.json
            catalog-europe-clean-rebuild-v20.log
          retention-days: 7