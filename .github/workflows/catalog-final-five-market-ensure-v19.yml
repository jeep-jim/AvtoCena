name: Catalog final five-market ensure v19

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/catalog-final-five-market-ensure-v19.yml

permissions:
  contents: write

concurrency:
  group: catalog-production-import
  cancel-in-progress: false

jobs:
  ensure:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - name: Ensure parser and importer fixes exist locally
        run: |
          python - <<'PY'
          from pathlib import Path

          def patch(path_value, old, new, marker):
              path = Path(path_value)
              text = path.read_text(encoding='utf-8')
              if old in text:
                  text = text.replace(old, new, 1)
              elif marker not in text:
                  raise SystemExit(f'{path_value}: required fix target missing')
              path.write_text(text, encoding='utf-8')

          patch('apps/web/lib/catalog/importer-impl.ts',
            '''      const marketRemaining = fixedMarket ? Math.max(0, targetPerMarket - refreshedByMarket[fixedMarket]) : configuredMaxOffers;
      const sourceMaxOffers = Math.min(configuredMaxOffers, marketRemaining || configuredMaxOffers);''',
            '''      // Rejected candidates do not consume the valid-offer target.
      const sourceMaxOffers = configuredMaxOffers;''',
            'const sourceMaxOffers = configuredMaxOffers;')
          patch('apps/web/lib/catalog/importer-impl.ts',
            '''                const freshImages = await source.fetchImages(base);
                images = credibleCatalogImages(mergeImages(previousImages, freshImages, maxImagesPerOffer));''',
            '''                const freshImages = credibleCatalogImages(await source.fetchImages(base));
                images = freshImages.length
                  ? source.sourceId === "guazi_china_export"
                    ? freshImages.slice(0, maxImagesPerOffer)
                    : credibleCatalogImages(mergeImages(freshImages, previousImages, maxImagesPerOffer))
                  : previousImages;''',
            'source.sourceId === "guazi_china_export"')
          patch('apps/web/lib/catalog/guazi-export-source.ts',
            '    const card = markup.slice(Math.max(0, anchor.first - 2_500), Math.min(markup.length, nextIndex + 1_200));',
            '    const card = markup.slice(anchor.first, Math.max(anchor.first, nextIndex));',
            'markup.slice(anchor.first, Math.max(anchor.first, nextIndex))')
          patch('apps/web/lib/catalog/guazi-export-source.ts',
            '''    let urls = [...(row.images || [])];
    if (urls.length < limit && row.url) {
      const detail = await fetchHtml(row.url, row.url).catch(() => null);
      if (detail?.response.ok) urls = [...urls, ...collectImages(detail.markup, row.url)];
    }
    const cached = await Promise.all([...new Set(urls)].slice(0, limit).map((url) =>''',
            '''    // Never read recommendation images from the whole detail page.
    const urls = [...new Set(row.images || [])];
    const cached = await Promise.all(urls.slice(0, limit).map((url) =>''',
            'Never read recommendation images')
          patch('apps/web/lib/catalog/otomoto-detail-source.ts',
            '''        const markup = await fetchMarkup(url).catch(() => "");
        if (!markup) return raw;
        const parsed = embeddedPrice(markup) || visiblePrice(markup);
        return parsed ? { ...row, price: parsed.price, currency: parsed.currency } : raw;''',
            '''        const currentPrice = Number(row.price || 0);
        const currentCurrency = String(row.currency || "").toUpperCase();
        if (currentPrice > 0 && ["PLN", "EUR"].includes(currentCurrency)) return raw;
        const markup = await fetchMarkup(url).catch(() => "");
        if (!markup) return raw;
        const parsed = embeddedPrice(markup);
        return parsed ? { ...row, price: parsed.price, currency: parsed.currency } : raw;''',
            'currentCurrency = String(row.currency')
          PY
          npm run typecheck

      - name: Reset exact-market scans
        run: npx tsx scripts/catalog-reset-underfilled-scans.mjs
        env:
          JSON_STORAGE_DRIVER: object
          YC_OBJECT_STORAGE_ENDPOINT: ${{ secrets.YC_OBJECT_STORAGE_ENDPOINT }}
          YC_OBJECT_STORAGE_REGION: ${{ secrets.YC_OBJECT_STORAGE_REGION }}
          YC_OBJECT_STORAGE_BUCKET: ${{ secrets.YC_OBJECT_STORAGE_BUCKET }}
          YC_OBJECT_STORAGE_ACCESS_KEY_ID: ${{ secrets.YC_OBJECT_STORAGE_ACCESS_KEY_ID }}
          YC_OBJECT_STORAGE_SECRET_ACCESS_KEY: ${{ secrets.YC_OBJECT_STORAGE_SECRET_ACCESS_KEY }}
          YC_OBJECT_STORAGE_PREFIX: ${{ secrets.YC_OBJECT_STORAGE_PREFIX }}
          CATALOG_IMPORT_SOURCES: goonet_japan_exact,encar_direct,guazi_china_export,dubicars_uae_exact,otomoto_europe_exact

      - name: Ensure and audit all five markets
        run: |
          cat > scripts/catalog-final-five-market-ensure-v19.mjs <<'NODE'
          const fs = await import('node:fs/promises');
          const { catalogImportSources, importCatalog } = await import('../apps/web/lib/catalog/importer.ts');
          const { exactMarketSources } = await import('../apps/web/lib/catalog/exact-market-sources.ts');
          const { mutateSourcePolicy } = await import('../apps/web/lib/catalog/policy.ts');
          const { credibleCatalogImages, isCrediblePublicOffer } = await import('../apps/web/lib/catalog/offer-quality.ts');
          const { readAllOffersForMaintenance } = await import('../apps/web/lib/catalog/storage.ts');

          for (const source of exactMarketSources) {
            const index = catalogImportSources.findIndex((item) => item.sourceId === source.sourceId);
            if (index >= 0) catalogImportSources[index] = source;
            else catalogImportSources.push(source);
          }
          const markets = ['japan','korea','china','uae','europe'];
          const counts = (offers) => Object.fromEntries(markets.map((market)=>[market,offers.filter((offer)=>offer.market===market&&isCrediblePublicOffer(offer)).length]));
          const sleep = (ms) => new Promise((resolve)=>setTimeout(resolve,ms));
          const before = counts(await readAllOffersForMaintenance());
          const runs = [];

          async function runTask(task) {
            const source = catalogImportSources.find((item)=>item.sourceId===task.sourceId);
            if (!source) throw new Error(`missing_${task.sourceId}`);
            await mutateSourcePolicy(source,(policy)=>({...policy,enabled:true,blockedUntil:undefined,consecutiveFailures:0,maxPagesPerRun:Math.max(Number(policy.maxPagesPerRun||0),task.pages),maxOffersPerRun:Math.max(Number(policy.maxOffersPerRun||0),task.candidates),maxDetailsPerRun:Math.max(Number(policy.maxDetailsPerRun||0),task.candidates),imagesEnabled:true}));
            process.env.CATALOG_TARGET_PER_MARKET=String(task.target);
            process.env.CATALOG_IMPORT_BUDGET_MS=String(task.minutes*60000);
            process.env.CATALOG_SOURCE_BUDGET_MS=String((task.minutes-5)*60000);
            process.env.CATALOG_MAX_IMAGES_PER_OFFER='3';
            process.env.CATALOG_PRESERVE_PREVIOUS_ON_FAILURE='true';
            process.env.CATALOG_GROW_ONLY_MARKETS='korea';
            let result;
            for (let attempt=1;attempt<=20;attempt++) {
              try {
                result=await importCatalog({sourceIds:[task.sourceId],maxOffers:task.candidates,maxDetails:task.candidates,maxImagesPerOffer:3,maxPages:task.pages,requireObjectStorage:true,failOnZeroSaved:false,reportPath:`catalog/imports/latest-${task.market}-ensure-v19.json`});
                break;
              } catch (error) {
                const message=String(error?.message||error);
                if (!message.includes('catalog_import_locked')||attempt===20) throw error;
                console.log(`[v19] ${task.market}: lock busy, retry ${attempt}/20`);
                await sleep(60000);
              }
            }
            runs.push({market:task.market,sourceId:task.sourceId,target:task.target,imported:result.imported,updated:result.updated,rejectedByQuality:result.rejectedByQuality,imageFailures:result.imageFailures,publicByMarket:result.publicByMarket,sources:result.sources});
          }

          const tasks = [
            {market:'japan',sourceId:'goonet_japan_exact',target:250,candidates:500,pages:35,minutes:65},
            {market:'china',sourceId:'guazi_china_export',target:250,candidates:650,pages:50,minutes:75},
            {market:'uae',sourceId:'dubicars_uae_exact',target:Math.max(1,250-Number(before.uae||0)),candidates:750,pages:50,minutes:75},
            {market:'europe',sourceId:'otomoto_europe_exact',target:250,candidates:650,pages:45,minutes:75},
          ];
          if (Number(before.korea||0)<250) tasks.unshift({market:'korea',sourceId:'encar_direct',target:250-Number(before.korea||0),candidates:500,pages:15,minutes:50});
          for (const task of tasks) await runTask(task);

          const offers=await readAllOffersForMaintenance();
          const after=counts(offers);
          const imageOwners=new Map();
          for(const offer of offers.filter(isCrediblePublicOffer)){const image=credibleCatalogImages(offer.images||[])[0];const key=String(image?.checksum||image?.id||'');if(!key)continue;const rows=imageOwners.get(key)||[];rows.push({id:offer.id,market:offer.market,sourceId:offer.sourceId,make:offer.make,model:offer.model,year:offer.year});imageOwners.set(key,rows);}
          const duplicateFirstImages=[...imageOwners.entries()].filter(([,rows])=>rows.length>1).map(([checksum,rows])=>({checksum,rows})).slice(0,200);
          const priceOwners=new Map();
          for(const offer of offers.filter(isCrediblePublicOffer)){const total=Number(offer.totalRub||0);if(!total)continue;const key=`${offer.market}:${offer.sourceId}:${total}`;const rows=priceOwners.get(key)||[];rows.push({id:offer.id,make:offer.make,model:offer.model,year:offer.year});priceOwners.set(key,rows);}
          const repeatedPrices=[...priceOwners.entries()].filter(([,rows])=>rows.length>=4).map(([key,rows])=>({key,count:rows.length,rows:rows.slice(0,20)})).slice(0,200);
          const report={version:19,before,after,reached250:Object.fromEntries(markets.map((market)=>[market,Number(after[market]||0)>=250])),runs,duplicateFirstImages,repeatedPrices,finishedAt:new Date().toISOString()};
          await fs.writeFile('catalog-final-five-market-ensure-v19.json',JSON.stringify(report,null,2));
          console.log(JSON.stringify({before,after,reached250:report.reached250,runs},null,2));
          NODE
          npx tsx scripts/catalog-final-five-market-ensure-v19.mjs 2>&1 | tee catalog-final-five-market-ensure-v19.log
        env:
          JSON_STORAGE_DRIVER: object
          YC_OBJECT_STORAGE_ENDPOINT: ${{ secrets.YC_OBJECT_STORAGE_ENDPOINT }}
          YC_OBJECT_STORAGE_REGION: ${{ secrets.YC_OBJECT_STORAGE_REGION }}
          YC_OBJECT_STORAGE_BUCKET: ${{ secrets.YC_OBJECT_STORAGE_BUCKET }}
          YC_OBJECT_STORAGE_ACCESS_KEY_ID: ${{ secrets.YC_OBJECT_STORAGE_ACCESS_KEY_ID }}
          YC_OBJECT_STORAGE_SECRET_ACCESS_KEY: ${{ secrets.YC_OBJECT_STORAGE_SECRET_ACCESS_KEY }}
          YC_OBJECT_STORAGE_PREFIX: ${{ secrets.YC_OBJECT_STORAGE_PREFIX }}
          CATALOG_SOURCE_TIMEOUT_MS: "35000"
          CATALOG_IMAGE_TIMEOUT_MS: "12000"
          CATALOG_ENCAR_DIRECT_PAGE_SIZE: "50"

      - name: Commit code and final report
        if: always()
        run: |
          if [ ! -f catalog-final-five-market-ensure-v19.json ]; then echo '{"version":19,"fatal":true,"error":"report_missing"}' > catalog-final-five-market-ensure-v19.json; fi
          rm -f scripts/catalog-final-five-market-ensure-v19.mjs
          git pull --rebase origin main || true
          mkdir -p data/catalog/imports
          cp catalog-final-five-market-ensure-v19.json data/catalog/imports/last-catalog-final-five-market-ensure-v19.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/web/lib/catalog/importer-impl.ts apps/web/lib/catalog/guazi-export-source.ts apps/web/lib/catalog/otomoto-detail-source.ts data/catalog/imports/last-catalog-final-five-market-ensure-v19.json
          git commit -m "Finalize five-market catalog integrity v19 [skip ci]" || true
          git push origin HEAD:main || true
