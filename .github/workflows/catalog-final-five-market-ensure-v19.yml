name: Catalog Europe verified rebuild v23

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/catalog-final-five-market-ensure-v19.yml
      - apps/web/lib/catalog/otomoto-current-source.ts
      - apps/web/lib/catalog/otomoto-detail-source.ts
      - apps/web/lib/catalog/rates.ts
      - apps/web/lib/catalog/offer-quality.ts

permissions:
  contents: write

concurrency:
  group: catalog-production-import
  cancel-in-progress: false

jobs:
  rebuild-europe:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - name: Apply permanent importer safeguards idempotently
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path('apps/web/lib/catalog/importer-impl.ts')
          text = path.read_text(encoding='utf-8')

          if 'const sourceMaxOffers = configuredMaxOffers;' not in text:
              text, count = re.subn(
                  r'\s*const marketRemaining = fixedMarket \? Math\.max\(0, targetPerMarket - refreshedByMarket\[fixedMarket\]\) : configuredMaxOffers;\s*const sourceMaxOffers = Math\.min\(configuredMaxOffers, marketRemaining \|\| configuredMaxOffers\);',
                  '\n      // Invalid source rows do not consume the target of 250 valid cars.\n      const sourceMaxOffers = configuredMaxOffers;',
                  text,
                  count=1,
              )
              if count != 1:
                  raise SystemExit('importer candidate-limit patch target not found')

          if 'mergeImages(freshImages, previousImages, maxImagesPerOffer)' not in text:
              text, count = re.subn(
                  r'const freshImages = await source\.fetchImages\(base\);\s*images = credibleCatalogImages\(mergeImages\(previousImages, freshImages, maxImagesPerOffer\)\);',
                  'const freshImages = credibleCatalogImages(await source.fetchImages(base));\n                images = freshImages.length\n                  ? credibleCatalogImages(mergeImages(freshImages, previousImages, maxImagesPerOffer))\n                  : previousImages;',
                  text,
                  count=1,
              )
              if count != 1:
                  raise SystemExit('importer fresh-image patch target not found')

          path.write_text(text, encoding='utf-8')
          PY
          npm run typecheck

      - name: Reset Europe source cursor
        run: npx tsx scripts/catalog-reset-underfilled-scans.mjs
        env: &storage
          JSON_STORAGE_DRIVER: object
          YC_OBJECT_STORAGE_ENDPOINT: ${{ secrets.YC_OBJECT_STORAGE_ENDPOINT }}
          YC_OBJECT_STORAGE_REGION: ${{ secrets.YC_OBJECT_STORAGE_REGION }}
          YC_OBJECT_STORAGE_BUCKET: ${{ secrets.YC_OBJECT_STORAGE_BUCKET }}
          YC_OBJECT_STORAGE_ACCESS_KEY_ID: ${{ secrets.YC_OBJECT_STORAGE_ACCESS_KEY_ID }}
          YC_OBJECT_STORAGE_SECRET_ACCESS_KEY: ${{ secrets.YC_OBJECT_STORAGE_SECRET_ACCESS_KEY }}
          YC_OBJECT_STORAGE_PREFIX: ${{ secrets.YC_OBJECT_STORAGE_PREFIX }}
          CATALOG_IMPORT_SOURCES: otomoto_europe_exact

      - name: Import verified Europe offers and quarantine legacy rows
        run: |
          cat > scripts/catalog-europe-verified-rebuild-v23.mjs <<'NODE'
          const fs = await import('node:fs/promises');
          const { catalogImportSources, importCatalog } = await import('../apps/web/lib/catalog/importer.ts');
          const { exactMarketSources } = await import('../apps/web/lib/catalog/exact-market-sources.ts');
          const { mutateSourcePolicy } = await import('../apps/web/lib/catalog/policy.ts');
          const { isCrediblePublicOffer } = await import('../apps/web/lib/catalog/offer-quality.ts');
          const { persistCatalogOffers, readAllOffersForMaintenance } = await import('../apps/web/lib/catalog/storage.ts');

          const sourceId = 'otomoto_europe_exact';
          const exactSource = exactMarketSources.find((source) => source.sourceId === sourceId);
          if (!exactSource) throw new Error('missing_otomoto_exact_source');
          const sourceIndex = catalogImportSources.findIndex((source) => source.sourceId === sourceId);
          if (sourceIndex >= 0) catalogImportSources[sourceIndex] = exactSource;
          else catalogImportSources.push(exactSource);

          await mutateSourcePolicy(exactSource, (policy) => ({
            ...policy,
            enabled: true,
            blockedUntil: undefined,
            consecutiveFailures: 0,
            maxPagesPerRun: Math.max(Number(policy.maxPagesPerRun || 0), 60),
            maxOffersPerRun: Math.max(Number(policy.maxOffersPerRun || 0), 700),
            maxDetailsPerRun: Math.max(Number(policy.maxDetailsPerRun || 0), 700),
            imagesEnabled: true,
          }));

          process.env.CATALOG_TARGET_PER_MARKET = '250';
          process.env.CATALOG_TARGET_PUBLIC_OFFERS = '1250';
          process.env.CATALOG_IMPORT_BUDGET_MS = String(240 * 60 * 1000);
          process.env.CATALOG_SOURCE_BUDGET_MS = String(225 * 60 * 1000);
          process.env.CATALOG_MAX_IMAGES_PER_OFFER = '80';
          process.env.CATALOG_IMAGE_FETCH_CONCURRENCY = '6';
          process.env.CATALOG_PRESERVE_PREVIOUS_ON_FAILURE = 'true';
          process.env.CATALOG_GROW_ONLY_MARKETS = 'korea';

          const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
          const startedAt = new Date().toISOString();
          const cleanCutoff = Date.parse(startedAt);
          let result;

          for (let attempt = 1; attempt <= 30; attempt++) {
            try {
              result = await importCatalog({
                sourceIds: [sourceId],
                maxOffers: 700,
                maxDetails: 700,
                maxImagesPerOffer: 80,
                maxPages: 60,
                requireObjectStorage: true,
                failOnZeroSaved: false,
                reportPath: 'catalog/imports/latest-europe-verified-v23.json',
              });
              break;
            } catch (error) {
              const message = String(error?.message || error);
              if (!message.includes('catalog_import_locked') || attempt === 30) throw error;
              console.log(`[europe-v23] catalog locked, retry ${attempt}/30`);
              await sleep(60_000);
            }
          }

          const afterImport = await readAllOffersForMaintenance();
          const cleanOffers = afterImport
            .filter((offer) => offer.market === 'europe'
              && offer.sourceId === sourceId
              && Date.parse(String(offer.operational?.lastSeenAt || offer.updatedAt || '')) >= cleanCutoff
              && isCrediblePublicOffer({ ...offer, status: 'active' }))
            .sort((a, b) => Date.parse(String(b.operational?.sourcePublishedAt || b.firstSeenAt || b.updatedAt || '')) - Date.parse(String(a.operational?.sourcePublishedAt || a.firstSeenAt || a.updatedAt || '')))
            .slice(0, 250);
          const cleanIds = new Set(cleanOffers.map((offer) => offer.id));

          if (cleanIds.size < 80) throw new Error(`too_few_verified_europe_offers_${cleanIds.size}`);

          let quarantined = 0;
          const cleanedCatalog = afterImport.map((offer) => {
            if (offer.market !== 'europe' || offer.sourceId !== sourceId || cleanIds.has(offer.id) || offer.status !== 'active') return offer;
            quarantined++;
            return { ...offer, status: 'stale' };
          });
          await persistCatalogOffers(cleanedCatalog);

          const finalOffers = await readAllOffersForMaintenance();
          const publicEurope = finalOffers.filter((offer) => offer.market === 'europe' && isCrediblePublicOffer(offer));
          const imageCounts = publicEurope.map((offer) => Array.isArray(offer.images) ? offer.images.length : 0);
          const incomplete = publicEurope.filter((offer) => !offer.totalRub || offer.mileageKm == null || !offer.fuel || !offer.transmission || !offer.bodyType || !offer.drive || (!offer.engineCc && offer.fuel !== 'electric') || (!offer.powerHp && !offer.powerKw));
          const galleryMismatch = publicEurope.filter((offer) => {
            const rawCount = Array.isArray(offer.operational?.raw?.images) ? new Set(offer.operational.raw.images).size : 0;
            const savedCount = Array.isArray(offer.images) ? offer.images.length : 0;
            return rawCount > savedCount + 2;
          });

          const report = {
            version: 23,
            startedAt,
            finishedAt: new Date().toISOString(),
            verifiedImported: cleanIds.size,
            quarantined,
            publicEurope: publicEurope.length,
            images: {
              min: imageCounts.length ? Math.min(...imageCounts) : 0,
              max: imageCounts.length ? Math.max(...imageCounts) : 0,
              average: imageCounts.length ? Math.round(imageCounts.reduce((sum, value) => sum + value, 0) / imageCounts.length * 10) / 10 : 0,
            },
            incompleteCount: incomplete.length,
            incomplete: incomplete.slice(0, 30).map((offer) => ({ id: offer.id, make: offer.make, model: offer.model, year: offer.year, mileageKm: offer.mileageKm })),
            galleryMismatchCount: galleryMismatch.length,
            galleryMismatch: galleryMismatch.slice(0, 30).map((offer) => ({ id: offer.id, raw: offer.operational?.raw?.images?.length || 0, saved: offer.images?.length || 0 })),
            run: result,
          };
          await fs.writeFile('catalog-europe-verified-rebuild-v23.json', JSON.stringify(report, null, 2));
          console.log(JSON.stringify(report, null, 2));
          NODE
          npx tsx scripts/catalog-europe-verified-rebuild-v23.mjs 2>&1 | tee catalog-europe-verified-rebuild-v23.log
        env:
          <<: *storage
          CATALOG_SOURCE_TIMEOUT_MS: "45000"
          CATALOG_IMAGE_TIMEOUT_MS: "30000"
          CATALOG_RATE_TIMEOUT_MS: "15000"

      - name: Record Europe rebuild result and permanent safeguards
        if: always()
        run: |
          if [ ! -f catalog-europe-verified-rebuild-v23.json ]; then
            printf '{"version":23,"fatal":true,"error":"report_missing","finishedAt":"%s"}\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > catalog-europe-verified-rebuild-v23.json
          fi
          rm -f scripts/catalog-europe-verified-rebuild-v23.mjs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for attempt in 1 2 3 4 5; do
            git pull --rebase origin main || true
            mkdir -p data/catalog/imports
            cp catalog-europe-verified-rebuild-v23.json data/catalog/imports/last-catalog-europe-verified-rebuild-v23.json
            git add apps/web/lib/catalog/importer-impl.ts data/catalog/imports/last-catalog-europe-verified-rebuild-v23.json
            git commit -m "Finalize verified Europe catalog v23 [skip ci]" || true
            git push origin HEAD:main && break
            sleep 10
          done

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: catalog-europe-verified-rebuild-v23
          path: |
            catalog-europe-verified-rebuild-v23.json
            catalog-europe-verified-rebuild-v23.log
          retention-days: 7
