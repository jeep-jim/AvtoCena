name: Catalog readonly audit v18

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/catalog-readonly-audit-v18.yml

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Audit current object catalog
        run: |
          cat > scripts/catalog-readonly-audit-v18.mjs <<'NODE'
          const fs = await import('node:fs/promises');
          const { credibleCatalogImages, isCrediblePublicOffer } = await import('../apps/web/lib/catalog/offer-quality.ts');
          const { readAllOffersForMaintenance } = await import('../apps/web/lib/catalog/storage.ts');
          const markets = ['japan','korea','china','uae','europe'];
          const offers = await readAllOffersForMaintenance();
          const report = {version:18,checkedAt:new Date().toISOString(),totalStored:offers.length,markets:{}};
          for (const market of markets) {
            const all = offers.filter((offer)=>offer.market===market);
            const visible = all.filter(isCrediblePublicOffer);
            report.markets[market] = {
              stored:all.length,
              public:visible.length,
              active:all.filter((offer)=>offer.status==='active').length,
              stale:all.filter((offer)=>offer.status==='stale').length,
              bySource:all.reduce((out,offer)=>{const key=`${offer.sourceId}:${offer.status}`;out[key]=(out[key]||0)+1;return out;},{}),
              suspiciousTotals:visible.filter((offer)=>Number(offer.totalRub||0)>80000000||Number(offer.totalRub||0)<120000).slice(0,30).map((offer)=>({id:offer.id,sourceId:offer.sourceId,make:offer.make,model:offer.model,year:offer.year,sourcePrice:offer.sourcePrice,sourceCurrency:offer.sourceCurrency,totalRub:offer.totalRub})),
            };
          }
          const imageOwners = new Map();
          for (const offer of offers.filter(isCrediblePublicOffer)) {
            const image = credibleCatalogImages(offer.images||[])[0];
            const key = String(image?.checksum||image?.id||'');
            if (!key) continue;
            const rows=imageOwners.get(key)||[];rows.push({id:offer.id,market:offer.market,sourceId:offer.sourceId,make:offer.make,model:offer.model,year:offer.year});imageOwners.set(key,rows);
          }
          report.duplicateFirstImages=[...imageOwners.entries()].filter(([,rows])=>rows.length>1).map(([checksum,rows])=>({checksum,rows})).slice(0,100);
          const priceOwners=new Map();
          for (const offer of offers.filter(isCrediblePublicOffer)) {const total=Number(offer.totalRub||0);if(!total)continue;const key=`${offer.market}:${offer.sourceId}:${total}`;const rows=priceOwners.get(key)||[];rows.push({id:offer.id,make:offer.make,model:offer.model,year:offer.year});priceOwners.set(key,rows);}
          report.repeatedPrices=[...priceOwners.entries()].filter(([,rows])=>rows.length>=4).map(([key,rows])=>({key,count:rows.length,rows:rows.slice(0,20)})).slice(0,100);
          await fs.writeFile('catalog-readonly-audit-v18.json',JSON.stringify(report,null,2));
          console.log(JSON.stringify(Object.fromEntries(markets.map((market)=>[market,report.markets[market].public])),null,2));
          NODE
          npx tsx scripts/catalog-readonly-audit-v18.mjs
        env:
          JSON_STORAGE_DRIVER: object
          YC_OBJECT_STORAGE_ENDPOINT: ${{ secrets.YC_OBJECT_STORAGE_ENDPOINT }}
          YC_OBJECT_STORAGE_REGION: ${{ secrets.YC_OBJECT_STORAGE_REGION }}
          YC_OBJECT_STORAGE_BUCKET: ${{ secrets.YC_OBJECT_STORAGE_BUCKET }}
          YC_OBJECT_STORAGE_ACCESS_KEY_ID: ${{ secrets.YC_OBJECT_STORAGE_ACCESS_KEY_ID }}
          YC_OBJECT_STORAGE_SECRET_ACCESS_KEY: ${{ secrets.YC_OBJECT_STORAGE_SECRET_ACCESS_KEY }}
          YC_OBJECT_STORAGE_PREFIX: ${{ secrets.YC_OBJECT_STORAGE_PREFIX }}
      - name: Record audit
        if: always()
        run: |
          if [ ! -f catalog-readonly-audit-v18.json ]; then echo '{"version":18,"fatal":true}' > catalog-readonly-audit-v18.json; fi
          rm -f scripts/catalog-readonly-audit-v18.mjs
          git pull --rebase origin main || true
          mkdir -p data/catalog/imports
          cp catalog-readonly-audit-v18.json data/catalog/imports/last-catalog-readonly-audit-v18.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/catalog/imports/last-catalog-readonly-audit-v18.json
          git commit -m "Record readonly five-market audit v18 [skip ci]" || true
          git push origin HEAD:main || true
