name: Catalog Korea grow-only fill v16

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/catalog-korea-grow-only-v16.yml
      - apps/web/lib/catalog/adapters.ts
      - apps/web/lib/catalog/storage.ts
      - apps/web/lib/catalog/offer-quality.ts
      - apps/web/lib/catalog/spec-normalization.ts

permissions:
  contents: write

concurrency:
  group: catalog-production-import
  cancel-in-progress: false

jobs:
  fill-korea:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - name: Reset only Encar cursor
        run: npx tsx scripts/catalog-reset-underfilled-scans.mjs
        env:
          JSON_STORAGE_DRIVER: object
          YC_OBJECT_STORAGE_ENDPOINT: ${{ secrets.YC_OBJECT_STORAGE_ENDPOINT }}
          YC_OBJECT_STORAGE_REGION: ${{ secrets.YC_OBJECT_STORAGE_REGION }}
          YC_OBJECT_STORAGE_BUCKET: ${{ secrets.YC_OBJECT_STORAGE_BUCKET }}
          YC_OBJECT_STORAGE_ACCESS_KEY_ID: ${{ secrets.YC_OBJECT_STORAGE_ACCESS_KEY_ID }}
          YC_OBJECT_STORAGE_SECRET_ACCESS_KEY: ${{ secrets.YC_OBJECT_STORAGE_SECRET_ACCESS_KEY }}
          YC_OBJECT_STORAGE_PREFIX: ${{ secrets.YC_OBJECT_STORAGE_PREFIX }}
          CATALOG_IMPORT_SOURCES: encar_direct

      - name: Fill Korea without removing confirmed offers
        run: |
          cat > scripts/catalog-korea-grow-only-v16.mjs <<'NODE'
          const fs = await import('node:fs/promises');
          const { catalogImportSources, importCatalog } = await import('../apps/web/lib/catalog/importer.ts');
          const { mutateSourcePolicy } = await import('../apps/web/lib/catalog/policy.ts');
          const { isCrediblePublicOffer } = await import('../apps/web/lib/catalog/offer-quality.ts');
          const { readAllOffersForMaintenance } = await import('../apps/web/lib/catalog/storage.ts');

          const desired = 250;
          const sourceId = 'encar_direct';
          const count = (offers) => offers.filter((offer) => offer.market === 'korea' && isCrediblePublicOffer(offer)).length;
          const before = count(await readAllOffersForMaintenance());
          const deficit = Math.max(0, desired - before);
          let result = { imported: 0, updated: 0, rejectedByQuality: 0, imageFailures: 0, sources: [], skipped: false, error: undefined };

          if (deficit > 0) {
            const source = catalogImportSources.find((item) => item.sourceId === sourceId);
            if (!source) throw new Error('encar_direct_not_registered');
            const candidateLimit = Math.min(800, Math.max(300, deficit * 3));
            process.env.CATALOG_TARGET_PER_MARKET = String(deficit);
            process.env.CATALOG_TARGET_PUBLIC_OFFERS = '1250';
            process.env.CATALOG_IMPORT_BUDGET_MS = String(110 * 60 * 1000);
            process.env.CATALOG_SOURCE_BUDGET_MS = String(100 * 60 * 1000);
            process.env.CATALOG_MAX_IMAGES_PER_OFFER = '3';
            process.env.CATALOG_PRESERVE_PREVIOUS_ON_FAILURE = 'true';
            process.env.CATALOG_GROW_ONLY_MARKETS = 'korea';
            process.env.CATALOG_OFFER_RETENTION_MS = String(45 * 24 * 60 * 60 * 1000);
            process.env.CATALOG_STALE_GRACE_MS = String(45 * 24 * 60 * 60 * 1000);

            await mutateSourcePolicy(source, (policy) => ({
              ...policy,
              enabled: true,
              blockedUntil: undefined,
              consecutiveFailures: 0,
              maxPagesPerRun: Math.max(Number(policy.maxPagesPerRun || 0), 20),
              maxOffersPerRun: Math.max(Number(policy.maxOffersPerRun || 0), candidateLimit),
              maxDetailsPerRun: Math.max(Number(policy.maxDetailsPerRun || 0), candidateLimit),
              imagesEnabled: true,
            }));

            result = await importCatalog({
              sourceIds: [sourceId],
              maxOffers: candidateLimit,
              maxDetails: candidateLimit,
              maxImagesPerOffer: 3,
              maxPages: 20,
              requireObjectStorage: true,
              failOnZeroSaved: false,
              reportPath: 'catalog/imports/latest-korea-grow-only-v16.json',
            }).catch((error) => ({ imported: 0, updated: 0, rejectedByQuality: 0, imageFailures: 0, sources: [], skipped: false, error: error?.message || String(error) }));
          } else {
            result.skipped = true;
          }

          const after = count(await readAllOffersForMaintenance());
          const report = {
            version: 16,
            market: 'korea',
            sourceId,
            protectedGrowOnly: true,
            before,
            after,
            deficit,
            gained: Math.max(0, after - before),
            reached: after >= desired,
            imported: Number(result.imported || 0),
            updated: Number(result.updated || 0),
            rejectedByQuality: Number(result.rejectedByQuality || 0),
            imageFailures: Number(result.imageFailures || 0),
            skipped: Boolean(result.skipped),
            error: result.error,
            sources: result.sources || [],
            finishedAt: new Date().toISOString(),
          };
          await fs.writeFile('catalog-korea-grow-only-v16.json', JSON.stringify(report, null, 2));
          console.log(JSON.stringify(report, null, 2));
          NODE
          npx tsx scripts/catalog-korea-grow-only-v16.mjs 2>&1 | tee catalog-korea-grow-only-v16.log
        env:
          JSON_STORAGE_DRIVER: object
          YC_OBJECT_STORAGE_ENDPOINT: ${{ secrets.YC_OBJECT_STORAGE_ENDPOINT }}
          YC_OBJECT_STORAGE_REGION: ${{ secrets.YC_OBJECT_STORAGE_REGION }}
          YC_OBJECT_STORAGE_BUCKET: ${{ secrets.YC_OBJECT_STORAGE_BUCKET }}
          YC_OBJECT_STORAGE_ACCESS_KEY_ID: ${{ secrets.YC_OBJECT_STORAGE_ACCESS_KEY_ID }}
          YC_OBJECT_STORAGE_SECRET_ACCESS_KEY: ${{ secrets.YC_OBJECT_STORAGE_SECRET_ACCESS_KEY }}
          YC_OBJECT_STORAGE_PREFIX: ${{ secrets.YC_OBJECT_STORAGE_PREFIX }}
          CATALOG_SOURCE_TIMEOUT_MS: "35000"
          CATALOG_IMAGE_TIMEOUT_MS: "12000"
          CATALOG_ENCAR_DIRECT_PAGE_SIZE: "50"
          CATALOG_ENCAR_DIRECT_LIST_RPM: "10"
          CATALOG_ENCAR_DIRECT_DETAIL_RPM: "30"
          CATALOG_ENCAR_DIRECT_IMAGE_RPM: "30"
          CATALOG_GROW_ONLY_MARKETS: korea

      - name: Record Korea grow-only result
        if: always()
        run: |
          if [ ! -f catalog-korea-grow-only-v16.json ]; then echo '{"version":16,"market":"korea","fatal":true,"error":"report_missing"}' > catalog-korea-grow-only-v16.json; fi
          git pull --rebase origin main || true
          mkdir -p data/catalog/imports
          cp catalog-korea-grow-only-v16.json data/catalog/imports/last-korea-grow-only-v16.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/catalog/imports/last-korea-grow-only-v16.json
          git commit -m "Record Korea grow-only fill v16 [skip ci]" || true
          git push origin HEAD:main || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: catalog-korea-grow-only-v16
          path: |
            catalog-korea-grow-only-v16.json
            catalog-korea-grow-only-v16.log
          if-no-files-found: warn
          retention-days: 7
