name: Sync Drom brand logos

on:
  push:
    branches:
      - feat/local-drom-brand-logos-20260723
    paths:
      - scripts/sync_drom_brand_logos.py
      - scripts/sync_drom_brand_logos_v2.py
      - apps/web/components/catalog/BrandLogoRail.tsx
      - apps/web/public/brand-logos/drom-source/**
      - .github/workflows/sync-drom-brand-logos.yml
  pull_request:
    branches:
      - main
    paths:
      - scripts/sync_drom_brand_logos.py
      - scripts/sync_drom_brand_logos_v2.py
      - apps/web/components/catalog/BrandLogoRail.tsx
      - apps/web/public/brand-logos/drom-source/**
      - .github/workflows/sync-drom-brand-logos.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip logo sync]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/local-drom-brand-logos-20260723
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install image tooling
        run: python -m pip install --disable-pip-version-check requests pillow cairosvg

      - name: Normalize uploaded Drom logos
        run: python scripts/sync_drom_brand_logos_v2.py

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Verify production web build
        run: |
          npm ci
          npm run build

      - name: Upload complete logo library
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: drom-brand-logo-library-${{ github.run_id }}
          path: apps/web/public/brand-logos/drom
          if-no-files-found: error
          retention-days: 3

      - name: Commit local logo library
        if: github.event_name == 'push'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/web/public/brand-logos/drom
          if git diff --cached --quiet; then
            echo "Drom logo library is already current."
            exit 0
          fi
          git commit -m "Sync normalized Drom brand logos [skip logo sync]"
          git fetch origin feat/local-drom-brand-logos-20260723
          git rebase origin/feat/local-drom-brand-logos-20260723
          git push origin HEAD:feat/local-drom-brand-logos-20260723
