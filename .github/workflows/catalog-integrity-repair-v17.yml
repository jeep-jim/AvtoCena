name: Catalog integrity repair v17

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/catalog-integrity-repair-v17.yml

permissions:
  contents: write

concurrency:
  group: catalog-production-import
  cancel-in-progress: false

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 210
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Apply targeted catalog fixes
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(path_value, old, new, label):
              path = Path(path_value)
              text = path.read_text(encoding='utf-8')
              if old not in text:
                  raise SystemExit(f'{label}: target not found in {path_value}')
              path.write_text(text.replace(old, new, 1), encoding='utf-8')

          replace_once(
              'apps/web/lib/catalog/guazi-export-source.ts',
              '    const card = markup.slice(Math.max(0, anchor.first - 2_500), Math.min(markup.length, nextIndex + 1_200));',
              '    const card = markup.slice(anchor.first, Math.max(anchor.first, nextIndex));',
              'guazi bounded card',
          )

          replace_once(
              'apps/web/lib/catalog/guazi-export-source.ts',
              '''    let urls = [...(row.images || [])];
    if (urls.length < limit && row.url) {
      const detail = await fetchHtml(row.url, row.url).catch(() => null);
      if (detail?.response.ok) urls = [...urls, ...collectImages(detail.markup, row.url)];
    }
    const cached = await Promise.all([...new Set(urls)].slice(0, limit).map((url) =>
      cacheImageFromUrl(url, "china", { headers: { ...HEADERS, referer: row.url } }).catch(() => null),
    ));''',
              '''    // Listing-card images are already scoped to this exact product URL.
    // Do not scrape the whole detail page here: Guazi detail pages contain
    // recommendations for other cars and those photos must never enter this lot.
    const urls = [...new Set(row.images || [])];
    const cached = await Promise.all(urls.slice(0, limit).map((url) =>
      cacheImageFromUrl(url, "china", { headers: { ...HEADERS, referer: row.url } }).catch(() => null),
    ));''',
              'guazi detail gallery isolation',
          )

          replace_once(
              'apps/web/lib/catalog/importer-impl.ts',
              '''      const marketRemaining = fixedMarket ? Math.max(0, targetPerMarket - refreshedByMarket[fixedMarket]) : configuredMaxOffers;
      const sourceMaxOffers = Math.min(configuredMaxOffers, marketRemaining || configuredMaxOffers);''',
              '''      // maxOffers is a candidate scan limit, while targetPerMarket is a
      // count of successfully validated offers. Keeping them separate lets a
      // source continue past rejected candidates until the valid market target
      // is reached.
      const sourceMaxOffers = configuredMaxOffers;''',
              'candidate limit separation',
          )

          replace_once(
              'apps/web/lib/catalog/importer-impl.ts',
              '''                const freshImages = await source.fetchImages(base);
                images = credibleCatalogImages(mergeImages(previousImages, freshImages, maxImagesPerOffer));''',
              '''                const freshImages = credibleCatalogImages(await source.fetchImages(base));
                images = freshImages.length
                  ? source.sourceId === "guazi_china_export"
                    ? freshImages.slice(0, maxImagesPerOffer)
                    : credibleCatalogImages(mergeImages(freshImages, previousImages, maxImagesPerOffer))
                  : previousImages;''',
              'fresh image precedence',
          )

          replace_once(
              'apps/web/lib/catalog/otomoto-detail-source.ts',
              '''        const markup = await fetchMarkup(url).catch(() => "");
        if (!markup) return raw;
        const parsed = embeddedPrice(markup) || visiblePrice(markup);
        return parsed ? { ...row, price: parsed.price, currency: parsed.currency } : raw;''',
              '''        const currentPrice = Number(row.price || 0);
        const currentCurrency = String(row.currency || "").toUpperCase();
        // The listing card is scoped to one offer and is the primary source.
        // Never replace it with a price found elsewhere on a detail page
        // (finance widgets and recommended cars also contain prices).
        if (currentPrice > 0 && ["PLN", "EUR"].includes(currentCurrency)) return raw;
        const markup = await fetchMarkup(url).catch(() => "");
        if (!markup) return raw;
        const parsed = embeddedPrice(markup);
        return parsed ? { ...row, price: parsed.price, currency: parsed.currency } : raw;''',
              'otomoto scoped price',
          )
          PY

      - name: Typecheck and tests
        run: |
          npm run typecheck
          npm test
          npm run build

      - name: Verify live Guazi card isolation
        run: |
          cat > scripts/verify-guazi-card-isolation-v17.mjs <<'NODE'
          const { parseGuaziExportPage } = await import('../apps/web/lib/catalog/guazi-export-source.ts');
          const url = 'https://en.guazi.com/used-cars/nissan/';
          const response = await fetch(url, { headers: { 'user-agent': 'Mozilla/5.0 Chrome/150.0.0.0 Safari/537.36' } });
          if (!response.ok) throw new Error(`guazi_fixture_http_${response.status}`);
          const rows = parseGuaziExportPage(await response.text(), url);
          if (rows.length < 4) throw new Error(`guazi_fixture_rows_${rows.length}`);
          const owners = new Map();
          for (const row of rows) {
            for (const image of row.images) {
              const previous = owners.get(image);
              if (previous && previous !== row.id) throw new Error(`guazi_cross_lot_image_${previous}_${row.id}`);
              owners.set(image, row.id);
            }
          }
          console.log(JSON.stringify({ rows: rows.length, uniqueImages: owners.size }, null, 2));
          NODE
          npx tsx scripts/verify-guazi-card-isolation-v17.mjs

      - name: Commit verified fixes
        run: |
          rm -f scripts/verify-guazi-card-isolation-v17.mjs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/web/lib/catalog/guazi-export-source.ts
          git add apps/web/lib/catalog/importer-impl.ts
          git add apps/web/lib/catalog/otomoto-detail-source.ts
          git commit -m "Fix China lot photos and Europe offer prices [skip ci]" || true
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Reset China and Europe source cursors
        run: npx tsx scripts/catalog-reset-underfilled-scans.mjs
        env:
          JSON_STORAGE_DRIVER: object
          YC_OBJECT_STORAGE_ENDPOINT: ${{ secrets.YC_OBJECT_STORAGE_ENDPOINT }}
          YC_OBJECT_STORAGE_REGION: ${{ secrets.YC_OBJECT_STORAGE_REGION }}
          YC_OBJECT_STORAGE_BUCKET: ${{ secrets.YC_OBJECT_STORAGE_BUCKET }}
          YC_OBJECT_STORAGE_ACCESS_KEY_ID: ${{ secrets.YC_OBJECT_STORAGE_ACCESS_KEY_ID }}
          YC_OBJECT_STORAGE_SECRET_ACCESS_KEY: ${{ secrets.YC_OBJECT_STORAGE_SECRET_ACCESS_KEY }}
          YC_OBJECT_STORAGE_PREFIX: ${{ secrets.YC_OBJECT_STORAGE_PREFIX }}
          CATALOG_IMPORT_SOURCES: guazi_china_export,otomoto_europe_exact

      - name: Refresh China and Europe and audit all five markets
        run: |
          cat > scripts/catalog-integrity-repair-v17.mjs <<'NODE'
          const fs = await import('node:fs/promises');
          const { importCatalog, catalogImportSources } = await import('../apps/web/lib/catalog/importer.ts');
          const { exactMarketSources } = await import('../apps/web/lib/catalog/exact-market-sources.ts');
          const { mutateSourcePolicy } = await import('../apps/web/lib/catalog/policy.ts');
          const { credibleCatalogImages, isCrediblePublicOffer } = await import('../apps/web/lib/catalog/offer-quality.ts');
          const { readAllOffersForMaintenance } = await import('../apps/web/lib/catalog/storage.ts');

          for (const source of exactMarketSources) {
            const index = catalogImportSources.findIndex((item) => item.sourceId === source.sourceId);
            if (index >= 0) catalogImportSources[index] = source;
            else catalogImportSources.push(source);
          }

          const markets = ['japan', 'korea', 'china', 'uae', 'europe'];
          const publicCounts = (offers) => Object.fromEntries(markets.map((market) => [market, offers.filter((offer) => offer.market === market && isCrediblePublicOffer(offer)).length]));
          const sourceCounts = (offers) => offers.reduce((result, offer) => {
            const key = `${offer.market}:${offer.sourceId}:${offer.status}`;
            result[key] = (result[key] || 0) + 1;
            return result;
          }, {});

          function rejectionReasons(offer) {
            const reasons = [];
            if (offer.status !== 'active') reasons.push(`status:${offer.status}`);
            if (!String(offer.make || '').trim()) reasons.push('make');
            if (!String(offer.model || '').trim()) reasons.push('model');
            const year = Number(offer.year || 0);
            if (year < 1985 || year > new Date().getFullYear() + 1) reasons.push('year');
            const images = credibleCatalogImages(offer.images || []);
            if (!images.length) reasons.push('images');
            const total = Number(offer.totalRub || 0);
            if (!total && !['needs_data', 'auction_start'].includes(String(offer.calculationStatus || ''))) reasons.push('missing_total');
            if (total && (total < 120000 || total > 180000000)) reasons.push('total_range');
            if (total && year >= 2022 && total < 900000) reasons.push('new_too_low');
            else if (total && year >= 2018 && total < 500000) reasons.push('recent_too_low');
            return reasons.length ? reasons : ['other_quality_rule'];
          }

          function audit(offers) {
            const rejectedByMarket = {};
            for (const market of markets) {
              const totals = {};
              const samples = [];
              for (const offer of offers.filter((item) => item.market === market && !isCrediblePublicOffer(item))) {
                const reasons = rejectionReasons(offer);
                for (const reason of reasons) totals[reason] = (totals[reason] || 0) + 1;
                if (samples.length < 12) samples.push({ id: offer.id, sourceId: offer.sourceId, make: offer.make, model: offer.model, year: offer.year, totalRub: offer.totalRub, calculationStatus: offer.calculationStatus, imageCount: credibleCatalogImages(offer.images || []).length, status: offer.status, reasons });
              }
              rejectedByMarket[market] = { totals, samples };
            }

            const duplicateFirstImages = [];
            const imageOwners = new Map();
            for (const offer of offers.filter(isCrediblePublicOffer)) {
              const first = credibleCatalogImages(offer.images || [])[0];
              const key = String(first?.checksum || first?.id || '');
              if (!key) continue;
              const list = imageOwners.get(key) || [];
              list.push({ id: offer.id, market: offer.market, sourceId: offer.sourceId, make: offer.make, model: offer.model, year: offer.year });
              imageOwners.set(key, list);
            }
            for (const [checksum, owners] of imageOwners) if (owners.length > 1) duplicateFirstImages.push({ checksum, owners });

            const repeatedPrices = [];
            const prices = new Map();
            for (const offer of offers.filter(isCrediblePublicOffer)) {
              const total = Number(offer.totalRub || 0);
              if (!total) continue;
              const key = `${offer.market}:${offer.sourceId}:${total}`;
              const list = prices.get(key) || [];
              list.push({ id: offer.id, make: offer.make, model: offer.model, year: offer.year });
              prices.set(key, list);
            }
            for (const [key, owners] of prices) if (owners.length >= 4) repeatedPrices.push({ key, count: owners.length, owners: owners.slice(0, 12) });

            return { publicByMarket: publicCounts(offers), sourceCounts: sourceCounts(offers), rejectedByMarket, duplicateFirstImages: duplicateFirstImages.slice(0, 100), repeatedPrices: repeatedPrices.slice(0, 100) };
          }

          const beforeOffers = await readAllOffersForMaintenance();
          const report = { version: 17, startedAt: new Date().toISOString(), before: audit(beforeOffers), refreshes: [] };

          for (const task of [
            { market: 'china', sourceId: 'guazi_china_export', maxOffers: 500, maxPages: 50, minutes: 70 },
            { market: 'europe', sourceId: 'otomoto_europe_exact', maxOffers: 500, maxPages: 36, minutes: 80 },
          ]) {
            const source = catalogImportSources.find((item) => item.sourceId === task.sourceId);
            if (!source) throw new Error(`source_not_registered_${task.sourceId}`);
            await mutateSourcePolicy(source, (policy) => ({ ...policy, enabled: true, blockedUntil: undefined, consecutiveFailures: 0, maxPagesPerRun: Math.max(Number(policy.maxPagesPerRun || 0), task.maxPages), maxOffersPerRun: Math.max(Number(policy.maxOffersPerRun || 0), task.maxOffers), maxDetailsPerRun: Math.max(Number(policy.maxDetailsPerRun || 0), task.maxOffers), imagesEnabled: true }));
            process.env.CATALOG_TARGET_PER_MARKET = '250';
            process.env.CATALOG_IMPORT_BUDGET_MS = String(task.minutes * 60 * 1000);
            process.env.CATALOG_SOURCE_BUDGET_MS = String((task.minutes - 5) * 60 * 1000);
            process.env.CATALOG_MAX_IMAGES_PER_OFFER = '3';
            process.env.CATALOG_PRESERVE_PREVIOUS_ON_FAILURE = 'true';
            process.env.CATALOG_GROW_ONLY_MARKETS = 'korea';
            const result = await importCatalog({ sourceIds: [task.sourceId], maxOffers: task.maxOffers, maxDetails: task.maxOffers, maxImagesPerOffer: 3, maxPages: task.maxPages, requireObjectStorage: true, failOnZeroSaved: false, reportPath: `catalog/imports/latest-${task.market}-integrity-v17.json` });
            report.refreshes.push({ market: task.market, sourceId: task.sourceId, imported: result.imported, updated: result.updated, rejectedByQuality: result.rejectedByQuality, imageFailures: result.imageFailures, sources: result.sources });
          }

          const afterOffers = await readAllOffersForMaintenance();
          report.after = audit(afterOffers);
          report.finishedAt = new Date().toISOString();
          await fs.writeFile('catalog-integrity-repair-v17.json', JSON.stringify(report, null, 2));
          console.log(JSON.stringify({ before: report.before.publicByMarket, after: report.after.publicByMarket, refreshes: report.refreshes }, null, 2));
          NODE
          npx tsx scripts/catalog-integrity-repair-v17.mjs 2>&1 | tee catalog-integrity-repair-v17.log
        env:
          JSON_STORAGE_DRIVER: object
          YC_OBJECT_STORAGE_ENDPOINT: ${{ secrets.YC_OBJECT_STORAGE_ENDPOINT }}
          YC_OBJECT_STORAGE_REGION: ${{ secrets.YC_OBJECT_STORAGE_REGION }}
          YC_OBJECT_STORAGE_BUCKET: ${{ secrets.YC_OBJECT_STORAGE_BUCKET }}
          YC_OBJECT_STORAGE_ACCESS_KEY_ID: ${{ secrets.YC_OBJECT_STORAGE_ACCESS_KEY_ID }}
          YC_OBJECT_STORAGE_SECRET_ACCESS_KEY: ${{ secrets.YC_OBJECT_STORAGE_SECRET_ACCESS_KEY }}
          YC_OBJECT_STORAGE_PREFIX: ${{ secrets.YC_OBJECT_STORAGE_PREFIX }}
          CATALOG_SOURCE_TIMEOUT_MS: "35000"
          CATALOG_IMAGE_TIMEOUT_MS: "12000"

      - name: Record five-market audit
        if: always()
        run: |
          if [ ! -f catalog-integrity-repair-v17.json ]; then printf '{"version":17,"fatal":true,"error":"report_missing","finishedAt":"%s"}\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > catalog-integrity-repair-v17.json; fi
          rm -f scripts/catalog-integrity-repair-v17.mjs
          git pull --rebase origin main || true
          mkdir -p data/catalog/imports
          cp catalog-integrity-repair-v17.json data/catalog/imports/last-catalog-integrity-repair-v17.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/catalog/imports/last-catalog-integrity-repair-v17.json
          git commit -m "Record five-market integrity repair v17 [skip ci]" || true
          git push origin HEAD:main || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: catalog-integrity-repair-v17
          path: |
            catalog-integrity-repair-v17.json
            catalog-integrity-repair-v17.log
          if-no-files-found: warn
          retention-days: 7
