name: Run catalog production import once

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/catalog-production-import-once.yml

permissions:
  contents: write

concurrency:
  group: catalog-production-import
  cancel-in-progress: false

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 220
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Remove test-generated local catalog data
        run: |
          rm -rf data/catalog/internal data/catalog/generations data/catalog/scans data/catalog/health data/catalog/imports data/catalog/sources
          rm -f data/catalog/manifest.json data/catalog/import-lock.json

      - name: Recover previously valid catalog
        run: npx tsx scripts/catalog-recover-active.mjs
        env:
          JSON_STORAGE_DRIVER: object
          YC_OBJECT_STORAGE_ENDPOINT: ${{ secrets.YC_OBJECT_STORAGE_ENDPOINT }}
          YC_OBJECT_STORAGE_REGION: ${{ secrets.YC_OBJECT_STORAGE_REGION }}
          YC_OBJECT_STORAGE_BUCKET: ${{ secrets.YC_OBJECT_STORAGE_BUCKET }}
          YC_OBJECT_STORAGE_ACCESS_KEY_ID: ${{ secrets.YC_OBJECT_STORAGE_ACCESS_KEY_ID }}
          YC_OBJECT_STORAGE_SECRET_ACCESS_KEY: ${{ secrets.YC_OBJECT_STORAGE_SECRET_ACCESS_KEY }}
          YC_OBJECT_STORAGE_PREFIX: ${{ secrets.YC_OBJECT_STORAGE_PREFIX }}
          CATALOG_RECOVERY_WINDOW_MS: "3888000000"
          CATALOG_RECOVERY_MIN_PUBLIC: "20"

      - name: Import public offers from every market
        id: production
        shell: bash
        run: |
          code=1
          : > catalog-import-production.log
          for attempt in $(seq 1 3); do
            echo "[catalog] production attempt $attempt" | tee -a catalog-import-production.log
            set +e
            npm run catalog:import:sample 2>&1 | tee -a catalog-import-production.log
            code=${PIPESTATUS[0]}
            set -e
            if [ "$code" = "0" ]; then
              break
            fi
            if grep -q "catalog_import_locked" catalog-import-production.log && [ "$attempt" -lt 3 ]; then
              echo "[catalog] active lock found; retrying in 180 seconds" | tee -a catalog-import-production.log
              sleep 180
              continue
            fi
            break
          done
          echo "conclusion_code=$code" >> "$GITHUB_OUTPUT"
          exit 0
        env:
          JSON_STORAGE_DRIVER: object
          YC_OBJECT_STORAGE_ENDPOINT: ${{ secrets.YC_OBJECT_STORAGE_ENDPOINT }}
          YC_OBJECT_STORAGE_REGION: ${{ secrets.YC_OBJECT_STORAGE_REGION }}
          YC_OBJECT_STORAGE_BUCKET: ${{ secrets.YC_OBJECT_STORAGE_BUCKET }}
          YC_OBJECT_STORAGE_ACCESS_KEY_ID: ${{ secrets.YC_OBJECT_STORAGE_ACCESS_KEY_ID }}
          YC_OBJECT_STORAGE_SECRET_ACCESS_KEY: ${{ secrets.YC_OBJECT_STORAGE_SECRET_ACCESS_KEY }}
          YC_OBJECT_STORAGE_PREFIX: ${{ secrets.YC_OBJECT_STORAGE_PREFIX }}
          CATALOG_IMPORT_RESET: "false"
          CATALOG_TARGET_PUBLIC_OFFERS: "1250"
          CATALOG_TARGET_PER_MARKET: "250"
          CATALOG_ENCAR_DIRECT_PAGE_SIZE: "48"
          CATALOG_ENCAR_DIRECT_LIST_RPM: "30"
          CATALOG_ENCAR_DIRECT_DETAIL_RPM: "240"
          CATALOG_ENCAR_DIRECT_IMAGE_RPM: "600"
          CATALOG_CHE168_GLOBAL_PAGE_SIZE: "48"
          CATALOG_CHE168_GLOBAL_MAX_BRANDS: "24"
          CATALOG_IMPORT_MAX_OFFERS: "250"
          CATALOG_IMPORT_MAX_DETAILS: "250"
          CATALOG_IMPORT_MAX_PAGES: "20"
          CATALOG_MAX_IMAGES_PER_OFFER: "10"
          CATALOG_SOURCE_TIMEOUT_MS: "30000"
          CATALOG_IMAGE_TIMEOUT_MS: "15000"
          CATALOG_IMPORT_BUDGET_MS: "10800000"
          CATALOG_SOURCE_BUDGET_MS: "1500000"
          CATALOG_OFFER_RETENTION_MS: "3888000000"
          CATALOG_STALE_GRACE_MS: "3888000000"
          CATALOG_IMPORT_REPORT_FILE: catalog-import-public-markets-report.json

      - name: Record production import report
        if: always()
        env:
          CONCLUSION_CODE: ${{ steps.production.outputs.conclusion_code }}
        run: |
          mkdir -p data/catalog/imports
          python - <<'PY'
          import json, os
          from pathlib import Path
          source = Path('catalog-import-public-markets-report.json')
          log = Path('catalog-import-production.log')
          target = Path('data/catalog/imports/last-manual-production-report.json')
          try:
              data = json.loads(source.read_text(encoding='utf-8'))
          except Exception:
              data = {'reportMissing': True}
          data['workflowConclusionCode'] = int(os.environ.get('CONCLUSION_CODE') or 1)
          if data.get('reportMissing'):
              try:
                  text = log.read_text(encoding='utf-8', errors='replace')
                  data['logTail'] = text[-24000:]
              except Exception as error:
                  data['logReadError'] = str(error)
          target.write_text(json.dumps(data, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          PY
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add data/catalog/imports/last-manual-production-report.json
          git commit -m "Record protected multi-market production import report" || exit 0
          git pull --rebase origin main
          git push origin HEAD:main

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: catalog-import-public-markets-report-once
          path: |
            catalog-import-public-markets-report.json
            catalog-import-production.log
          if-no-files-found: warn
          retention-days: 7

      - name: Fail when production import failed
        if: steps.production.outputs.conclusion_code != '0'
        run: exit 1
