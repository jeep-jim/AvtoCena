name: DubiCars image diagnostic v2

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/catalog-dubicars-image-diagnostic.yml

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Inspect raw DubiCars gallery data
        run: |
          cat > scripts/dubicars-image-diagnostic.mjs <<'NODE'
          const fs = await import('node:fs/promises');
          const detailUrl = 'https://www.dubicars.com/2022-chevrolet-camaro-ss-988696.html';
          const headers = {
            accept: 'text/html,application/xhtml+xml,*/*;q=0.8',
            'accept-language': 'en-US,en;q=0.9',
            'cache-control': 'no-cache',
            pragma: 'no-cache',
            'user-agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/150.0.0.0 Safari/537.36'
          };
          const response = await fetch(detailUrl, { headers, redirect: 'follow' });
          const markup = await response.text();
          const values = [];
          for (const match of markup.matchAll(/(?:src|data-src|data-original|data-lazy-src|href|content|poster)\s*=\s*["']([^"']+)["']/gi)) values.push(match[1]);
          for (const match of markup.matchAll(/https?:\\?\/\\?\/[^"'<>\s\\]+/gi)) values.push(match[0]);
          const normalize = (value) => String(value || '')
            .replace(/&amp;/gi, '&')
            .replace(/\\u002F/gi, '/')
            .replace(/\\\//g, '/')
            .replace(/^\/\//, 'https://');
          const absolute = (value) => { try { return new URL(normalize(value), detailUrl).toString(); } catch { return ''; } };
          const unique = [...new Set(values.map(absolute).filter(Boolean))];
          const candidates = unique.filter((url) => !/\.svg(?:[?#]|$)/i.test(url) && !/(?:favicon|logo|icon|avatar|sprite|tracking|pixel|googleplay|appstore|whatsapp|facebook|instagram|twitter|youtube)/i.test(url) && /(?:jpe?g|png|webp|avif|cloudfront|imagekit|cdn|media|upload|gallery|listing|vehicle|car-image)/i.test(url));
          const checks = [];
          for (const imageUrl of candidates.slice(0, 60)) {
            const controller = new AbortController();
            const timer = setTimeout(() => controller.abort(), 15000);
            try {
              const imageResponse = await fetch(imageUrl, {
                headers: {
                  accept: 'image/avif,image/webp,image/apng,image/*,*/*;q=0.8',
                  'accept-language': 'en-US,en;q=0.9',
                  'user-agent': headers['user-agent'],
                  referer: detailUrl
                },
                redirect: 'follow',
                signal: controller.signal
              });
              const body = await imageResponse.arrayBuffer();
              checks.push({ imageUrl, ok: imageResponse.ok, status: imageResponse.status, finalUrl: imageResponse.url, contentType: imageResponse.headers.get('content-type'), contentLength: body.byteLength });
            } catch (error) {
              checks.push({ imageUrl, ok: false, error: error?.message || String(error) });
            } finally {
              clearTimeout(timer);
            }
          }
          const hostCounts = candidates.reduce((result, url) => {
            const host = new URL(url).hostname;
            result[host] = (result[host] || 0) + 1;
            return result;
          }, {});
          const report = {
            startedAt: new Date().toISOString(),
            detailUrl,
            detailStatus: response.status,
            markupLength: markup.length,
            uniqueUrlCount: unique.length,
            candidateCount: candidates.length,
            hostCounts,
            candidates: candidates.slice(0, 120),
            checks,
            finishedAt: new Date().toISOString()
          };
          await fs.writeFile('dubicars-image-diagnostic.json', JSON.stringify(report, null, 2));
          console.log(JSON.stringify(report, null, 2));
          NODE
          npx tsx scripts/dubicars-image-diagnostic.mjs
      - name: Record diagnostic
        if: always()
        run: |
          if [ ! -f dubicars-image-diagnostic.json ]; then echo '{"fatal":true,"error":"diagnostic_file_missing"}' > dubicars-image-diagnostic.json; fi
          git pull --rebase origin main || true
          mkdir -p data/catalog/imports
          cp dubicars-image-diagnostic.json data/catalog/imports/last-dubicars-image-diagnostic.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/catalog/imports/last-dubicars-image-diagnostic.json
          git commit -m "Record raw DubiCars gallery diagnostic [skip ci]" || true
          git push origin HEAD:main || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dubicars-image-diagnostic-v2
          path: dubicars-image-diagnostic.json
          if-no-files-found: warn
